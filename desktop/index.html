<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创世者编辑器 - 镜像囚笼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d0d14;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #252542;
            --accent-cyan: #00d4ff;
            --accent-purple: #7b2cbf;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: rgba(255,255,255,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .header {
            height: 50px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,212,255,0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        /* 主内容区 */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧工具栏 */
        .sidebar {
            width: 250px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .tool-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .tool-item.active {
            background: rgba(0,212,255,0.1);
            color: var(--accent-cyan);
        }

        .tool-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 编辑区 */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tabs-bar {
            height: 40px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.05);
        }

        .tab.active {
            background: var(--bg-primary);
            border-bottom-color: var(--accent-cyan);
        }

        .tab-close {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: all 0.2s;
        }

        .tab:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .editor-content {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        .welcome-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-secondary);
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .welcome-subtitle {
            font-size: 14px;
            margin-bottom: 30px;
        }

        .quick-actions {
            display: flex;
            gap: 15px;
        }

        /* 右侧面板 */
        .right-panel {
            width: 300px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            overflow: auto;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: rgba(0,212,255,0.1);
            color: var(--accent-cyan);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 底部状态栏 */
        .status-bar {
            height: 28px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            color: var(--text-secondary);
            justify-content: space-between;
        }

        .status-left, .status-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 通知提示 */
        .notification {
            position: fixed;
            top: 60px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,212,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .notification-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🎮</div>
            <span>创世者编辑器</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="openLauncher()">
                <span>🌐</span> 启动页
            </button>
            <button class="btn btn-primary" onclick="createNewProject()">
                <span>✨</span> 新建项目
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧工具栏 -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">创作工具</div>
                <div class="tool-list">
                    <div class="tool-item active" onclick="switchTool(this, 'world')">
                        <span class="tool-icon">🌍</span>
                        <span>世界观</span>
                    </div>
                    <div class="tool-item" onclick="switchTool(this, 'character')">
                        <span class="tool-icon">👤</span>
                        <span>角色设定</span>
                    </div>
                    <div class="tool-item" onclick="switchTool(this, 'plot')">
                        <span class="tool-icon">📖</span>
                        <span>剧情大纲</span>
                    </div>
                    <div class="tool-item" onclick="switchTool(this, 'chapter')">
                        <span class="tool-icon">📝</span>
                        <span>章节编辑</span>
                    </div>
                    <div class="tool-item" onclick="switchTool(this, 'names')">
                        <span class="tool-icon">🏷️</span>
                        <span>取名工具</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">项目管理</div>
                <div class="tool-list">
                    <div class="tool-item" onclick="switchTool(this, 'export')">
                        <span class="tool-icon">📤</span>
                        <span>导出</span>
                    </div>
                    <div class="tool-item" onclick="switchTool(this, 'settings')">
                        <span class="tool-icon">⚙️</span>
                        <span>设置</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 编辑区 -->
        <main class="editor-area">
            <div class="tabs-bar">
                <div class="tab active">
                    <span>🌍</span>
                    <span>世界观.json</span>
                    <span class="tab-close">×</span>
                </div>
            </div>
            <div class="editor-content">
                <div class="welcome-screen" id="welcome">
                    <div class="welcome-icon">🎮</div>
                    <div class="welcome-title">创世者编辑器</div>
                    <div class="welcome-subtitle">为「镜像囚笼」量身定制的创作工具</div>
                    <div class="quick-actions">
                        <button class="btn btn-primary" onclick="loadWorldData()">
                            <span>🌍</span> 加载世界观
                        </button>
                        <button class="btn btn-secondary" onclick="loadCharacterData()">
                            <span>👥</span> 加载角色
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 右侧面板 -->
        <aside class="right-panel">
            <div class="panel-title">
                服务状态
                <span class="status-badge">
                    <span class="status-dot"></span>
                    运行中
                </span>
            </div>
            <div style="color: var(--text-secondary); font-size: 13px; line-height: 1.6;">
                <p style="margin-bottom: 15px;">HTTP服务正在监听端口 <strong style="color: var(--accent-cyan);">18790</strong></p>
                <p style="margin-bottom: 15px;">飞书菜单可直接触发编辑器启动</p>
                <div style="background: var(--bg-primary); padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px;">
                    <div style="color: var(--accent-gold); margin-bottom: 5px;">// 监听端点</div>
                    <div>POST /api/open</div>
                    <div style="margin-top: 10px; color: var(--accent-gold);">// 健康检查</div>
                    <div>GET /health</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 底部状态栏 -->
    <footer class="status-bar">
        <div class="status-left">
            <span class="status-item">
                <span>🎮</span>
                <span>就绪</span>
            </span>
        </div>
        <div class="status-right">
            <span class="status-item">项目: 镜像囚笼</span>
            <span class="status-item">v1.0.0</span>
        </div>
    </footer>

    <!-- 通知 -->
    <div class="notification" id="notification">
        <div class="notification-icon">🔔</div>
        <div class="notification-content">
            <div class="notification-title">菜单触发</div>
            <div class="notification-text">通过飞书菜单启动编辑器</div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        // 监听菜单触发事件
        ipcRenderer.on('menu-triggered', (event, data) => {
            console.log('Menu triggered:', data);
            showNotification('飞书菜单触发', '已通过菜单启动/聚焦编辑器');
        });

        // 显示通知
        function showNotification(title, text) {
            const notification = document.getElementById('notification');
            notification.querySelector('.notification-title').textContent = title;
            notification.querySelector('.notification-text').textContent = text;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 切换工具
        function switchTool(element, tool) {
            document.querySelectorAll('.tool-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            console.log('Switched to tool:', tool);
        }

        // 打开启动页
        function openLauncher() {
            window.open('../launcher.html', '_blank');
        }

        // 新建项目
        function createNewProject() {
            showNotification('新建项目', '功能开发中...');
        }

        // 加载世界观数据
        function loadWorldData() {
            fetch('../data/characters.json')
                .then(res => res.json())
                .then(data => {
                    console.log('World data loaded:', data);
                    showNotification('加载成功', '世界观数据已加载');
                })
                .catch(err => {
                    console.error('Failed to load:', err);
                    showNotification('加载失败', '无法读取数据文件');
                });
        }

        // 加载角色数据
        function loadCharacterData() {
            fetch('../data/names.json')
                .then(res => res.json())
                .then(data => {
                    console.log('Character data loaded:', data);
                    showNotification('加载成功', '角色数据已加载');
                })
                .catch(err => {
                    console.error('Failed to load:', err);
                    showNotification('加载失败', '无法读取数据文件');
                });
        }

        // 页面加载完成
        window.addEventListener('DOMContentLoaded', () => {
            console.log('[Creator] Editor loaded');
        });
    </script>
</body>
</html>
