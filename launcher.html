<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 创世者编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        /* 布局 */
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: #16213e;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid #0f3460;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
        }
        
        .nav-menu {
            flex: 1;
            padding: 20px 10px;
        }
        
        .nav-item {
            display: block;
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-item:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .nav-item.active {
            background: #e94560;
            color: #fff;
        }
        
        .nav-item i {
            margin-right: 10px;
            font-style: normal;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #16213e;
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #d63a54;
        }
        
        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #1a4a7a;
        }
        
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        
        .btn-success {
            background: #28a745;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .card-type {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #0f3460;
            color: #00d4ff;
        }
        
        .card-content {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
        }
        
        .card-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #0f3460;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 桥段详情弹窗 */
        .trope-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1500;
            justify-content: center;
            align-items: center;
        }
        
        .trope-detail-modal.active {
            display: flex;
        }
        
        .trope-detail-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .trope-detail-header {
            padding: 24px 30px 16px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .trope-detail-header h3 {
            font-size: 20px;
            color: #fff;
            margin: 0;
            flex: 1;
            padding-right: 15px;
        }
        
        .trope-detail-close {
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .trope-detail-close:hover {
            color: #fff;
            background: rgba(233, 69, 96, 0.2);
        }
        
        .trope-detail-body {
            padding: 24px 30px;
        }
        
        .trope-detail-content-text {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px;
            line-height: 1.8;
            color: #ddd;
            font-size: 14px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .trope-detail-source {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }
        
        .trope-detail-source-label {
            color: #00d4ff;
            font-size: 13px;
            font-weight: 500;
        }
        
        .trope-detail-source-info {
            color: #aaa;
            font-size: 13px;
        }
        
        .trope-detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .trope-detail-tag {
            padding: 5px 12px;
            background: rgba(233, 69, 96, 0.15);
            border-radius: 15px;
            font-size: 12px;
            color: #e94560;
        }
        
        .trope-detail-footer {
            padding: 16px 30px 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .trope-detail-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .trope-detail-btn-copy {
            background: #e94560;
            color: #fff;
        }
        
        .trope-detail-btn-copy:hover {
            background: #d63a54;
        }
        
        .trope-detail-btn-close {
            background: #0f3460;
            color: #fff;
        }
        
        .trope-detail-btn-close:hover {
            background: #1a4a7a;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .empty-state p {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: #16213e;
            padding: 5px;
            border-radius: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .tab.active {
            background: #e94560;
            color: #fff;
        }
        
        /* 列表视图 */
        .list-view {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item:hover {
            background: #1a2a4a;
        }
        
        .list-item-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .list-item-info p {
            font-size: 13px;
            color: #888;
        }
        
        .list-item-actions {
            display: flex;
            gap: 8px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        /* 数据操作 */
        .data-ops {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 桥段素材库面板样式 */
        .trope-panel {
            width: 0;
            min-width: 0;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .trope-panel.active {
            width: 380px;
            min-width: 380px;
            opacity: 1;
        }
        
        .trope-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .trope-panel-header h3 {
            font-size: 16px;
            color: #00d4ff;
        }
        
        .trope-panel-body {
            padding: 15px;
            height: calc(100vh - 250px);
            overflow-y: auto;
        }
        
        .trope-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .trope-cat-tag {
            padding: 6px 12px;
            background: #1a1a2e;
            border-radius: 15px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .trope-cat-tag:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .trope-cat-tag.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        
        .trope-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .trope-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }
        
        .trope-item:hover {
            border-color: #00d4ff;
            transform: translateX(-2px);
        }
        
        .trope-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .trope-item-type {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-radius: 10px;
        }
        
        .trope-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .trope-item-content {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .trope-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #0f3460;
        }
        
        .btn-copy {
            padding: 4px 12px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-copy:hover {
            background: #00d4ff;
        }

        /* Token输入框样式 */
        .token-input-group {
            display: flex;
            gap: 10px;
        }
        
        .token-input-group input {
            flex: 1;
        }
        
        .token-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .token-status.valid {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        
        .token-status.invalid {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        
        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .sync-status.synced {
            border-left: 3px solid #28a745;
        }
        
        .sync-status.unsynced {
            border-left: 3px solid #ffc107;
        }
        
        .sync-status.error {
            border-left: 3px solid #dc3545;
        }

        /* GitHub设置模态框 */
        .github-setup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .github-setup-modal.active {
            display: flex;
        }
        
        .github-setup-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }
        
        .github-setup-content h2 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        
        .github-setup-content p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .github-setup-content .form-group {
            text-align: left;
        }
        
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .help-text a {
            color: #00d4ff;
        }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 加载进度条 */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(233, 69, 96, 0.2);
            z-index: 3000;
            display: none;
        }
        
        .loading-bar.active {
            display: block;
        }
        
        .loading-bar-progress {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b8a);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        
        .loading-status {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 33, 62, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
            z-index: 3001;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1px solid #0f3460;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .loading-status.active {
            display: flex;
        }
        
        .loading-status-error {
            background: rgba(220, 53, 69, 0.95);
            border-color: #dc3545;
        }
        
        .loading-status-success {
            background: rgba(40, 167, 69, 0.95);
            border-color: #28a745;
        }

        /* 数据加载覆盖层 */
        .data-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.9);
            z-index: 2500;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        
        .data-loading-overlay.active {
            display: flex;
        }
        
        .data-loading-content {
            text-align: center;
        }
        
        .data-loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        .data-loading-text {
            font-size: 16px;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .data-loading-subtext {
            font-size: 13px;
            color: #888;
        }
        
        .data-loading-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🎮 创世者</h1>
                <p>镜像囚笼 · 小说编辑器</p>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" data-page="home">
                    <i>🏠</i>首页
                </a>
                <a class="nav-item" data-page="characters">
                    <i>👤</i>角色管理
                </a>
                <a class="nav-item" data-page="world">
                    <i>🌍</i>世界观
                </a>
                <a class="nav-item" data-page="plot">
                    <i>📖</i>情节大纲
                </a>
                <a class="nav-item" data-page="trope">
                    <i>🎭</i>桥段素材
                </a>
                <a class="nav-item" data-page="data">
                    <i>💾</i>数据管理
                </a>
            </nav>
        </aside>
        
        <!-- 主内容 -->
        <main class="main-content" id="mainContent">
            <!-- 动态加载内容 -->
        </main>
    </div>
    
    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>

                <div class="trope-detail-source">

                <button class="trope-detail-btn trope-detail-btn-copy" onclick="copyTropeDetailContent()">📋 复制内容</button>

    <!-- 加载进度条 -->
    <div class="loading-bar" id="loadingBar">
        <div class="loading-bar-progress" id="loadingBarProgress"></div>

    <!-- 加载状态提示 -->
    <div class="loading-status" id="loadingStatus">
        <span class="loading-spinner"></span>
        <span id="loadingStatusText">正在加载...</span>
    </div>
    
    <!-- 数据加载覆盖层 -->
    <div class="data-loading-overlay" id="dataLoadingOverlay">
        <div class="data-loading-content">
            <div class="data-loading-spinner"></div>
            <div class="data-loading-text" id="dataLoadingText">正在加载数据...</div>
            <div class="data-loading-subtext" id="dataLoadingSubtext">首次加载可能需要一些时间</div>
            <div class="data-loading-actions" id="dataLoadingActions" style="display:none;">
                <button class="btn btn-primary" onclick="retryLoadingData()">🔄 重试</button>
                <button class="btn btn-secondary" onclick="skipLoadingData()">⏭️ 跳过</button>

    <!-- GitHub Token 设置模态框 -->
    <div class="github-setup-modal" id="githubSetupModal">
        <div class="github-setup-content">
            <h2>🔐 GitHub 同步设置</h2>
            <p>为了实现跨设备数据同步，请输入你的 GitHub Personal Access Token。<br>数据将安全存储在你的私有 Gist 中。</p>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <div class="help-text">
                    没有 Token？<a href="https://github.com/settings/tokens/new?description=NovelEditor&scopes=gist" target="_blank">点击这里创建</a>（只需勾选 gist 权限）
                </div>
            </div>
            <div id="githubSetupError" style="color: #dc3545; margin-bottom: 15px; font-size: 14px; display: none;"></div>
            <button class="btn btn-primary" onclick="saveGitHubToken()" style="width: 100%;">保存并验证</button>
            <button class="btn btn-secondary" onclick="skipGitHubSetup()" style="width: 100%; margin-top: 10px; background: transparent;">稍后再说</button>
        </div>
    </div>

    <script>
        // ==================== GitHub 同步模块 ====================
        class GitHubSync {
            constructor() {
                this.token = localStorage.getItem('github_token');
                this.gistId = localStorage.getItem('github_gist_id');
                this.lastSyncTime = localStorage.getItem('last_sync_time');
                this.tropeDataUrl = 'data.json';
            }

            // 检查是否已配置
            isConfigured() {
                return !!this.token;
            }

            // 保存 Token
            saveToken(token) {
                this.token = token;
                localStorage.setItem('github_token', token);
            }

            // 验证 Token
            async verifyToken() {
                if (!this.token) return false;
                try {
                    const response = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    return response.ok;
                } catch (e) {
                    return false;
                }
            }

            // 获取或创建 Gist
            async getOrCreateGist() {
                if (this.gistId) {
                    // 检查 Gist 是否存在
                    try {
                        const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                            headers: {
                                'Authorization': `token ${this.token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });
                        if (response.ok) {
                            return this.gistId;
                        }
                    } catch (e) {
                        console.error('Gist check failed:', e);
                    }
                }

                // 创建新 Gist
                try {
                    const response = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            description: '创世者编辑器 - 小说写作数据备份',
                            public: false,
                            files: {
                                'novel_editor_data.json': {
                                    content: JSON.stringify({
                                        version: 1,
                                        created_at: new Date().toISOString(),
                                        characters: [],
                                        world_settings: [],
                                        plots: []
                                    }, null, 2)
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.gistId = data.id;
                        localStorage.setItem('github_gist_id', data.id);
                        return data.id;
                    }
                } catch (e) {
                    console.error('Create gist failed:', e);
                    throw e;
                }
            }

            // 从 Gist 加载数据
            async loadFromGist() {
                if (!this.gistId || !this.token) return null;

                try {
                    const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const file = data.files['novel_editor_data.json'];
                        if (file) {
                            const content = JSON.parse(file.content);
                            this.lastSyncTime = new Date().toISOString();
                            localStorage.setItem('last_sync_time', this.lastSyncTime);
                            return content;
                        }
                    }
                } catch (e) {
                    console.error('Load from gist failed:', e);
                }
                return null;
            }

            // 保存数据到 Gist
            async saveToGist(data) {
                const gistId = await this.getOrCreateGist();

                try {
                    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: {
                                'novel_editor_data.json': {
                                    content: JSON.stringify({
                                        version: 1,
                                        updated_at: new Date().toISOString(),
                                        ...data
                                    }, null, 2)
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        this.lastSyncTime = new Date().toISOString();
                        localStorage.setItem('last_sync_time', this.lastSyncTime);
                        return true;
                    }
                } catch (e) {
                    console.error('Save to gist failed:', e);
                }
                return false;
            }

            // 从远程加载桥段数据（无缓存，强制实时加载）
            async loadTropeData() {
                try {
                    // 强制绕过缓存
                    const noCacheUrl = this.tropeDataUrl + '?t=' + new Date().getTime();
                    const response = await fetch(noCacheUrl, {
                        cache: 'no-store',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) {
                    console.error('Load trope data failed:', e);
                }
                return null;
            }

            // 清除配置
            clearConfig() {
                this.token = null;
                this.gistId = null;
                this.lastSyncTime = null;
                localStorage.removeItem('github_token');
                localStorage.removeItem('github_gist_id');
                localStorage.removeItem('last_sync_time');
            }
        }

        // ==================== 数据库模块 ====================
        class Database {
            constructor() {
                this.db = null;
                this.dbName = 'CreatorDB';
                this.dbVersion = 1;
                this.githubSync = new GitHubSync();
                this.syncEnabled = true;
            }
            
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // 角色表
                        if (!db.objectStoreNames.contains('characters')) {
                            const charStore = db.createObjectStore('characters', { keyPath: 'id', autoIncrement: true });
                            charStore.createIndex('name', 'name', { unique: false });
                            charStore.createIndex('role_type', 'role_type', { unique: false });
                        }
                        
                        // 世界观表
                        if (!db.objectStoreNames.contains('world_settings')) {
                            const worldStore = db.createObjectStore('world_settings', { keyPath: 'id', autoIncrement: true });
                            worldStore.createIndex('category', 'category', { unique: false });
                        }
                        
                        // 情节表
                        if (!db.objectStoreNames.contains('plots')) {
                            const plotStore = db.createObjectStore('plots', { keyPath: 'id', autoIncrement: true });
                            plotStore.createIndex('volume', 'volume', { unique: false });
                            plotStore.createIndex('chapter', 'chapter', { unique: false });
                        }
                    };
                });
            }
            
            // 通用CRUD操作
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.created_at = new Date().toISOString();
                    data.updated_at = new Date().toISOString();
                    const request = store.add(data);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve(request.result);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async getAll(storeName, indexName = null, value = null) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    let request;
                    
                    if (indexName && value !== null) {
                        const index = store.index(indexName);
                        request = index.getAll(value);
                    } else {
                        request = store.getAll();
                    }
                    
                    request.onsuccess = () => {
                        // 按更新时间倒序
                        const results = request.result.sort((a, b) => 
                            new Date(b.updated_at) - new Date(a.updated_at)
                        );
                        resolve(results);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async update(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updated_at = new Date().toISOString();
                    const request = store.put(data);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve(request.result);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 导出所有数据
            async exportAll() {
                return {
                    characters: await this.getAll('characters'),
                    world_settings: await this.getAll('world_settings'),
                    plots: await this.getAll('plots'),
                    export_time: new Date().toISOString()
                };
            }
            
            // 导入数据
            async importAll(data) {
                await this.clear('characters');
                await this.clear('world_settings');
                await this.clear('plots');
                
                for (const char of data.characters || []) {
                    delete char.id;
                    await this.add('characters', char);
                }
                
                for (const setting of data.world_settings || []) {
                    delete setting.id;
                    await this.add('world_settings', setting);
                }
                
                for (const plot of data.plots || []) {
                    delete plot.id;
                    await this.add('plots', plot);
                }

                // 导入后同步到 GitHub
                if (this.syncEnabled) {
                    await this.syncToGitHub();
                }
            }

            // 同步到 GitHub
            async syncToGitHub() {
                if (!this.githubSync.isConfigured()) return false;
                
                try {
                    const data = await this.exportAll();
                    const success = await this.githubSync.saveToGist(data);
                    if (success) {
                        updateSyncStatus('synced', '已同步到 GitHub');
                    }
                    return success;
                } catch (e) {
                    console.error('Sync to GitHub failed:', e);
                    updateSyncStatus('error', '同步失败');
                    return false;
                }
            }

            // 从 GitHub 加载
            async loadFromGitHub() {
                if (!this.githubSync.isConfigured()) return false;
                
                try {
                    const data = await this.githubSync.loadFromGist();
                    if (data) {
                        this.syncEnabled = false; // 临时禁用同步避免循环
                        await this.importAll(data);
                        this.syncEnabled = true;
                        updateSyncStatus('synced', '已从 GitHub 加载');
                        return true;
                    }
                } catch (e) {
                    console.error('Load from GitHub failed:', e);
                    updateSyncStatus('error', '加载失败');
                }
                return false;
            }
        }
        
        // ==================== 全局状态 ====================
        const db = new Database();
        const githubSync = new GitHubSync();
        let currentPage = 'home';
        let modalCallback = null;
        let tropesData = null;
        let currentTropeDetail = null;
        
        // 数据加载状态
        const dataLoadState = {
            characters: { loaded: false, loading: false, error: null, cached: false },
            worldview: { loaded: false, loading: false, error: null, cached: false },
            tropes: { loaded: false, loading: false, error: null }
        };
        
        // CDN 配置（优先使用 jsdelivr 加速 GitHub Pages）
        const CDN_CONFIG = {
            primary: 'https://cdn.jsdelivr.net/gh/sztbssz/novel-editor@latest/',
            fallback: 'https://sztbssz.github.io/novel-editor/',
            useCDN: true
        };
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await db.init();
            
            // 检查本地缓存状态
            await checkLocalCache();
            
            // 检查是否需要设置 GitHub Token
            if (!githubSync.isConfigured()) {
                showGitHubSetupModal();
            } else {
                // 尝试从 GitHub 加载数据
                await syncFromGitHub();
            }
            
            // 只加载桥段数据（轻量级）
            await loadTropeData();
            
            // 延迟加载角色和世界观数据（后台静默加载）
            setTimeout(() => {
                preloadDataSilently();
            }, 2000);
            
            loadPage('home');
            
            // 导航事件
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const page = item.dataset.page;
                    
                    // 懒加载：进入角色页时加载角色数据
                    if (page === 'characters' && !dataLoadState.characters.loaded && !dataLoadState.characters.loading) {
                        loadCharacterDataWithUI();
                    }
                    // 懒加载：进入世界观页时加载世界观数据
                    else if (page === 'world' && !dataLoadState.worldview.loaded && !dataLoadState.worldview.loading) {
                        loadWorldviewDataWithUI();
                    }
                    
                    loadPage(page);
                });
            });
        });
        
        // 检查本地缓存
        async function checkLocalCache() {
            try {
                const chars = await db.getAll('characters');
                const worlds = await db.getAll('world_settings');
                
                dataLoadState.characters.cached = chars.length > 0;
                dataLoadState.worldview.cached = worlds.length > 0;
                
                if (chars.length > 0) {
                    dataLoadState.characters.loaded = true;
                    console.log(`✅ 本地缓存: ${chars.length} 个角色`);
                }
                if (worlds.length > 0) {
                    dataLoadState.worldview.loaded = true;
                    console.log(`✅ 本地缓存: ${worlds.length} 条世界观`);
                }
            } catch (e) {
                console.error('检查本地缓存失败:', e);
            }
        }
        
        // 后台静默预加载
        async function preloadDataSilently() {
            if (!dataLoadState.characters.loaded) {
                console.log('🔄 后台预加载角色数据...');
                loadCharacterDataSilent();
            }
            if (!dataLoadState.worldview.loaded) {
                console.log('🔄 后台预加载世界观数据...');
                loadWorldviewDataSilent();
            }
        }
        
        // 显示加载进度条
        function showLoadingBar() {
            document.getElementById('loadingBar').classList.add('active');
        }
        
        function hideLoadingBar() {
            document.getElementById('loadingBar').classList.remove('active');
            document.getElementById('loadingBarProgress').style.width = '0%';
        }
        
        function updateLoadingBar(progress) {
            document.getElementById('loadingBarProgress').style.width = `${progress}%`;
        }
        
        // 显示加载状态提示
        function showLoadingStatus(text, type = 'normal') {
            const status = document.getElementById('loadingStatus');
            const statusText = document.getElementById('loadingStatusText');
            
            status.className = 'loading-status active';
            if (type === 'error') status.classList.add('loading-status-error');
            if (type === 'success') status.classList.add('loading-status-success');
            
            statusText.textContent = text;
        }
        
        function hideLoadingStatus() {
            document.getElementById('loadingStatus').classList.remove('active');
        }
        
        // 显示数据加载覆盖层
        function showDataLoadingOverlay(text, subtext = '') {
            document.getElementById('dataLoadingText').textContent = text;
            document.getElementById('dataLoadingSubtext').textContent = subtext;
            document.getElementById('dataLoadingActions').style.display = 'none';
            document.getElementById('dataLoadingOverlay').classList.add('active');
        }
        
        function hideDataLoadingOverlay() {
            document.getElementById('dataLoadingOverlay').classList.remove('active');
        }
        
        function showDataLoadingError(text) {
            document.getElementById('dataLoadingText').textContent = text;
            document.getElementById('dataLoadingSubtext').textContent = '请检查网络连接后重试';
            document.getElementById('dataLoadingActions').style.display = 'flex';
        }
        
        // 重试/跳过加载
        let currentLoadingRetry = null;
        function retryLoadingData() {
            if (currentLoadingRetry) {
                currentLoadingRetry();
            }
        }
        
        function skipLoadingData() {
            hideDataLoadingOverlay();
            showNotification('已跳过数据加载，部分功能可能不可用');
        }

        // 带超时的 fetch（支持重试）
        async function fetchWithRetry(url, options = {}) {
            const { timeout = 30000, retries = 3, retryDelay = 1000 } = options;
            let lastError;
            
            for (let i = 0; i < retries; i++) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                try {
                    const response = await fetch(url, { 
                        signal: controller.signal,
                        cache: 'no-cache'
                    });
                    clearTimeout(timeoutId);
                    return response;
                } catch (error) {
                    clearTimeout(timeoutId);
                    lastError = error;
                    console.warn(`⚠️ 请求失败 (${i + 1}/${retries}): ${url}`, error.message);
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, retryDelay * (i + 1)));
                    }
                }
            }
            throw lastError;
        }
        
        // 获取 URL（带 CDN 回退）
        async function fetchWithCDN(filename) {
            const urls = CDN_CONFIG.useCDN ? [
                `${CDN_CONFIG.primary}${filename}`,
                `${CDN_CONFIG.fallback}${filename}`
            ] : [`${CDN_CONFIG.fallback}${filename}`];
            
            for (let i = 0; i < urls.length; i++) {
                try {
                    const response = await fetchWithRetry(urls[i], { timeout: 30000, retries: 2 });
                    if (response.ok) {
                        if (i > 0) console.log(`✅ 使用回退 URL: ${urls[i]}`);
                        return response;
                    }
                } catch (e) {
                    if (i === urls.length - 1) throw e;
                    console.warn(`⚠️ CDN 失败，尝试回退: ${urls[i]}`);
                }
            }
            throw new Error('所有 URL 都失败');
        }

        // 加载角色数据（带 UI）
        async function loadCharacterDataWithUI() {
            if (dataLoadState.characters.loading) return;
            dataLoadState.characters.loading = true;
            
            showDataLoadingOverlay('正在加载角色数据...', '约 255 个角色，首次加载可能需要一些时间');
            showLoadingBar();
            
            try {
                await loadCharacterDataInternal((progress) => {
                    updateLoadingBar(progress);
                });
                
                hideDataLoadingOverlay();
                showLoadingStatus('✅ 角色数据加载完成', 'success');
                setTimeout(hideLoadingStatus, 2000);
            } catch (error) {
                console.error('加载角色数据失败:', error);
                dataLoadState.characters.error = error.message;
                showDataLoadingError('角色数据加载失败');
                currentLoadingRetry = () => {
                    dataLoadState.characters.loading = false;
                    loadCharacterDataWithUI();
                };
            } finally {
                dataLoadState.characters.loading = false;
                hideLoadingBar();
            }
        }
        
        // 静默加载角色数据
        async function loadCharacterDataSilent() {
            if (dataLoadState.characters.loading || dataLoadState.characters.loaded) return;
            dataLoadState.characters.loading = true;
            
            try {
                await loadCharacterDataInternal();
                console.log('✅ 后台静默加载角色数据完成');
            } catch (error) {
                console.error('后台加载角色数据失败:', error);
            } finally {
                dataLoadState.characters.loading = false;
            }
        }
        
        // 内部：实际加载角色数据
        async function loadCharacterDataInternal(onProgress = null) {
            const response = await fetchWithCDN('characters_all.json');
            
            if (response.ok) {
                const data = await response.json();
                let characters = data.characters || [];
                
                if (onProgress) onProgress(50);
                
                // 检查现有数据
                const existingChars = await db.getAll('characters');
                const existingNames = new Set(existingChars.map(c => c.name));
                
                let addedCount = 0;
                for (let i = 0; i < characters.length; i++) {
                    const char = characters[i];
                    if (!existingNames.has(char.name)) {
                        await db.add('characters', char);
                        addedCount++;
                    }
                    
                    if (onProgress && i % 50 === 0) {
                        onProgress(50 + (i / characters.length) * 50);
                    }
                }
                
                if (onProgress) onProgress(100);
                dataLoadState.characters.loaded = true;
                console.log(`✅ 角色数据加载完成: 新增 ${addedCount} 个角色`);
            }
        }

        // 加载世界观数据（带 UI）
        async function loadWorldviewDataWithUI() {
            if (dataLoadState.worldview.loading) return;
            dataLoadState.worldview.loading = true;
            
            showDataLoadingOverlay('正在加载世界观数据...');
            showLoadingBar();
            
            try {
                await loadWorldviewDataInternal((progress) => {
                    updateLoadingBar(progress);
                });
                
                hideDataLoadingOverlay();
                showLoadingStatus('✅ 世界观数据加载完成', 'success');
                setTimeout(hideLoadingStatus, 2000);
            } catch (error) {
                console.error('加载世界观数据失败:', error);
                dataLoadState.worldview.error = error.message;
                showDataLoadingError('世界观数据加载失败');
                currentLoadingRetry = () => {
                    dataLoadState.worldview.loading = false;
                    loadWorldviewDataWithUI();
                };
            } finally {
                dataLoadState.worldview.loading = false;
                hideLoadingBar();
            }
        }
        
        // 静默加载世界观数据
        async function loadWorldviewDataSilent() {
            if (dataLoadState.worldview.loading || dataLoadState.worldview.loaded) return;
            dataLoadState.worldview.loading = true;
            
            try {
                await loadWorldviewDataInternal();
                console.log('✅ 后台静默加载世界观数据完成');
            } catch (error) {
                console.error('后台加载世界观数据失败:', error);
            } finally {
                dataLoadState.worldview.loading = false;
            }
        }
        
        // 内部：实际加载世界观数据
        async function loadWorldviewDataInternal(onProgress = null) {
            const response = await fetchWithCDN('data.json?t=' + Date.now());
            
            if (response.ok) {
                const data = await response.json();
                if (onProgress) onProgress(30);
                
                const worldbuildingLibrary = data.worldbuildingLibrary;
                
                if (worldbuildingLibrary && worldbuildingLibrary.entries) {
                    const worldviews = worldbuildingLibrary.entries;
                    
                    // 检查是否已存在
                    const existingSettings = await db.getAll('world_settings');
                    const existingTitles = new Set(existingSettings.map(s => s.title));
                    
                    let addedCount = 0;
                    let skippedCount = 0;
                    
                    for (let i = 0; i < worldviews.length; i++) {
                        const world = worldviews[i];
                        const title = `${world.book} - 世界观`;
                        
                        if (!existingTitles.has(title)) {
                            const content = `**作者**: ${world.author}
**年份**: ${world.year}
**背景类型**: ${world.backgroundType}
**力量类型**: ${world.powerType}

**文化习俗**:
${world.culture}

**世界特色**:
${world.features}

**标签**: ${world.tags ? world.tags.join(', ') : '无'}`;
                            
                            // 根据标签判断分类
                            let category = 'other';
                            const tags = world.tags || [];
                            if (tags.some(t => ['玄幻', '仙侠', '洪荒', '封神'].includes(t))) category = 'cultivation';
                            else if (tags.some(t => ['都市', '现代', '国术', '医疗', '学霸'].includes(t))) category = 'modern';
                            else if (tags.some(t => ['科幻', '星际', '机甲', '未来'].includes(t))) category = 'scifi';
                            else if (tags.some(t => ['末世', '废土', '末日', '污染'].includes(t))) category = 'apocalypse';
                            else if (tags.some(t => ['历史', '架空历史', '穿越', '门阀', '士族'].includes(t))) category = 'history';
                            else if (tags.some(t => ['奇幻', '魔法', '西方', '魔兽'].includes(t))) category = 'magic';
                            else if (tags.some(t => ['灵异', '民俗', '盗墓', '克苏鲁'].includes(t))) category = 'horror';
                            
                            await db.add('world_settings', {
                                category: category,
                                title: title,
                                content: content
                            });
                            addedCount++;
                        } else {
                            skippedCount++;
                        }
                        
                        if (onProgress && i % 10 === 0) {
                            onProgress(30 + (i / worldviews.length) * 70);
                        }
                    }
                    
                    if (onProgress) onProgress(100);
                    dataLoadState.worldview.loaded = true;
                    console.log(`✅ 世界观库加载完成: 新增 ${addedCount} 条, 跳过 ${skippedCount} 条`);
                }
            }
        }

        // ==================== GitHub 设置 ====================
        function showGitHubSetupModal() {
            document.getElementById('githubSetupModal').classList.add('active');
        }

        function hideGitHubSetupModal() {
            document.getElementById('githubSetupModal').classList.remove('active');
            document.getElementById('githubSetupError').style.display = 'none';
        }

        function skipGitHubSetup() {
            hideGitHubSetupModal();
        }

        async function saveGitHubToken() {
            const token = document.getElementById('githubTokenInput').value.trim();
            const errorDiv = document.getElementById('githubSetupError');
            
            if (!token) {
                errorDiv.textContent = '请输入 GitHub Token';
                errorDiv.style.display = 'block';
                return;
            }

            if (!token.startsWith('ghp_')) {
                errorDiv.textContent = 'Token 格式不正确，应以 ghp_ 开头';
                errorDiv.style.display = 'block';
                return;
            }

            // 显示加载状态
            const btn = document.querySelector('#githubSetupModal .btn-primary');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading-spinner"></span> 验证中...';
            btn.disabled = true;

            try {
                githubSync.saveToken(token);
                const valid = await githubSync.verifyToken();
                
                if (valid) {
                    // 获取或创建 Gist
                    await githubSync.getOrCreateGist();
                    hideGitHubSetupModal();
                    showNotification('GitHub Token 已保存');
                    
                    // 尝试从 GitHub 加载数据
                    const loaded = await syncFromGitHub();
                    if (loaded) {
                        loadPage('home');
                    }
                } else {
                    errorDiv.textContent = 'Token 验证失败，请检查是否正确';
                    errorDiv.style.display = 'block';
                    githubSync.clearConfig();
                }
            } catch (e) {
                errorDiv.textContent = '验证失败：' + e.message;
                errorDiv.style.display = 'block';
                githubSync.clearConfig();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 更新同步状态显示
        function updateSyncStatus(status, message) {
            const statusEl = document.getElementById('syncStatus');
            if (statusEl) {
                statusEl.className = `sync-status ${status}`;
                const icons = {
                    synced: '✅',
                    unsynced: '⏳',
                    error: '❌'
                };
                statusEl.innerHTML = `${icons[status] || '⏳'} ${message}`;
            }
        }

        // 从 GitHub 同步
        async function syncFromGitHub() {
            if (!githubSync.isConfigured()) {
                showNotification('请先设置 GitHub Token');
                return false;
            }
            
            updateSyncStatus('unsynced', '正在从 GitHub 加载...');
            const success = await db.loadFromGitHub();
            if (success) {
                showNotification('已从 GitHub 恢复数据');
            }
            return success;
        }

        // 同步到 GitHub
        async function syncToGitHub() {
            if (!githubSync.isConfigured()) {
                showNotification('请先设置 GitHub Token');
                return false;
            }
            
            updateSyncStatus('unsynced', '正在同步到 GitHub...');
            const success = await db.syncToGitHub();
            if (success) {
                showNotification('已同步到 GitHub');
            } else {
                showNotification('同步失败');
            }
            return success;
        }
