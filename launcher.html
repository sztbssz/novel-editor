<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 创世者编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        /* 布局 */
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: #16213e;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid #0f3460;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
        }
        
        .nav-menu {
            flex: 1;
            padding: 20px 10px;
        }
        
        .nav-item {
            display: block;
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-item:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .nav-item.active {
            background: #e94560;
            color: #fff;
        }
        
        .nav-item i {
            margin-right: 10px;
            font-style: normal;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #16213e;
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #d63a54;
        }
        
        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #1a4a7a;
        }
        
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .card-type {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #0f3460;
            color: #00d4ff;
        }
        
        .card-content {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
        }
        
        .card-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #0f3460;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .empty-state p {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: #16213e;
            padding: 5px;
            border-radius: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .tab.active {
            background: #e94560;
            color: #fff;
        }
        
        /* 列表视图 */
        .list-view {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item:hover {
            background: #1a2a4a;
        }
        
        .list-item-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .list-item-info p {
            font-size: 13px;
            color: #888;
        }
        
        .list-item-actions {
            display: flex;
            gap: 8px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        /* 数据操作 */
        .data-ops {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 桥段素材库面板样式 */
        .trope-panel {
            width: 0;
            min-width: 0;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .trope-panel.active {
            width: 380px;
            min-width: 380px;
            opacity: 1;
        }
        
        .trope-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .trope-panel-header h3 {
            font-size: 16px;
            color: #00d4ff;
        }
        
        .trope-panel-body {
            padding: 15px;
            height: calc(100vh - 250px);
            overflow-y: auto;
        }
        
        .trope-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .trope-cat-tag {
            padding: 6px 12px;
            background: #1a1a2e;
            border-radius: 15px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .trope-cat-tag:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .trope-cat-tag.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        
        .trope-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .trope-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }
        
        .trope-item:hover {
            border-color: #00d4ff;
            transform: translateX(-2px);
        }
        
        .trope-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .trope-item-type {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-radius: 10px;
        }
        
        .trope-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .trope-item-content {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .trope-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #0f3460;
        }
        
        .btn-copy {
            padding: 4px 12px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-copy:hover {
            background: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🎮 创世者</h1>
                <p>镜像囚笼 · 小说编辑器</p>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" data-page="home">
                    <i>🏠</i>首页
                </a>
                <a class="nav-item" data-page="characters">
                    <i>👤</i>角色管理
                </a>
                <a class="nav-item" data-page="world">
                    <i>🌍</i>世界观
                </a>
                <a class="nav-item" data-page="plot">
                    <i>📖</i>情节大纲
                </a>
                <a class="nav-item" data-page="data">
                    <i>💾</i>数据管理
                </a>
            </nav>
        </aside>
        
        <!-- 主内容 -->
        <main class="main-content" id="mainContent">
            <!-- 动态加载内容 -->
        </main>
    </div>
    
    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm" onclick="confirmModal()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据库模块 ====================
        class Database {
            constructor() {
                this.db = null;
                this.dbName = 'CreatorDB';
                this.dbVersion = 1;
            }
            
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // 角色表
                        if (!db.objectStoreNames.contains('characters')) {
                            const charStore = db.createObjectStore('characters', { keyPath: 'id', autoIncrement: true });
                            charStore.createIndex('name', 'name', { unique: false });
                            charStore.createIndex('role_type', 'role_type', { unique: false });
                        }
                        
                        // 世界观表
                        if (!db.objectStoreNames.contains('world_settings')) {
                            const worldStore = db.createObjectStore('world_settings', { keyPath: 'id', autoIncrement: true });
                            worldStore.createIndex('category', 'category', { unique: false });
                        }
                        
                        // 情节表
                        if (!db.objectStoreNames.contains('plots')) {
                            const plotStore = db.createObjectStore('plots', { keyPath: 'id', autoIncrement: true });
                            plotStore.createIndex('volume', 'volume', { unique: false });
                            plotStore.createIndex('chapter', 'chapter', { unique: false });
                        }
                    };
                });
            }
            
            // 通用CRUD操作
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.created_at = new Date().toISOString();
                    data.updated_at = new Date().toISOString();
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async getAll(storeName, indexName = null, value = null) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    let request;
                    
                    if (indexName && value !== null) {
                        const index = store.index(indexName);
                        request = index.getAll(value);
                    } else {
                        request = store.getAll();
                    }
                    
                    request.onsuccess = () => {
                        // 按更新时间倒序
                        const results = request.result.sort((a, b) => 
                            new Date(b.updated_at) - new Date(a.updated_at)
                        );
                        resolve(results);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async update(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updated_at = new Date().toISOString();
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 导出所有数据
            async exportAll() {
                return {
                    characters: await this.getAll('characters'),
                    world_settings: await this.getAll('world_settings'),
                    plots: await this.getAll('plots'),
                    export_time: new Date().toISOString()
                };
            }
            
            // 导入数据
            async importAll(data) {
                await this.clear('characters');
                await this.clear('world_settings');
                await this.clear('plots');
                
                for (const char of data.characters || []) {
                    delete char.id;
                    await this.add('characters', char);
                }
                
                for (const setting of data.world_settings || []) {
                    delete setting.id;
                    await this.add('world_settings', setting);
                }
                
                for (const plot of data.plots || []) {
                    delete plot.id;
                    await this.add('plots', plot);
                }
            }
        }
        
        // ==================== 全局状态 ====================
        const db = new Database();
        let currentPage = 'home';
        let modalCallback = null;
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await db.init();
            loadPage('home');
            
            // 导航事件
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    loadPage(item.dataset.page);
                });
            });
        });
        
        // ==================== 页面加载 ====================
        function loadPage(page) {
            currentPage = page;
            const main = document.getElementById('mainContent');
            
            switch(page) {
                case 'home':
                    renderHome(main);
                    break;
                case 'characters':
                    renderCharacters(main);
                    break;
                case 'world':
                    renderWorld(main);
                    break;
                case 'plot':
                    renderPlot(main);
                    break;
                case 'data':
                    renderData(main);
                    break;
            }
        }
        
        // ==================== 首页 ====================
        async function renderHome(container) {
            const chars = await db.getAll('characters');
            const world = await db.getAll('world_settings');
            const plots = await db.getAll('plots');
            
            container.innerHTML = `
                <div class="header">
                    <h2>🏠 概览</h2>
                </div>
                
                <div class="card-grid">
                    <div class="card" onclick="loadPage('characters')">
                        <div class="card-header">
                            <span class="card-title">👤 角色</span>
                            <span class="card-type">${chars.length} 个</span>
                        </div>
                        <div class="card-content">
                            管理小说中的所有角色，包括主角、反派和配角。
                        </div>
                    </div>
                    
                    <div class="card" onclick="loadPage('world')">
                        <div class="card-header">
                            <span class="card-title">🌍 世界观</span>
                            <span class="card-type">${world.length} 项</span>
                        </div>
                        <div class="card-content">
                            设定地理环境、历史背景、文化习俗和力量体系。
                        </div>
                    </div>
                    
                    <div class="card" onclick="loadPage('plot')">
                        <div class="card-header">
                            <span class="card-title">📖 情节</span>
                            <span class="card-type">${plots.length} 章</span>
                        </div>
                        <div class="card-content">
                            规划分卷大纲和章节内容，追踪写作进度。
                        </div>
                    </div>
                    
                    <div class="card" onclick="loadPage('data')">
                        <div class="card-header">
                            <span class="card-title">💾 数据</span>
                            <span class="card-type">管理</span>
                        </div>
                        <div class="card-content">
                            导入导出数据，备份和恢复创作内容。
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ==================== 角色管理 ====================
        async function renderCharacters(container, filterType = 'all') {
            const characters = await db.getAll('characters');
            const filtered = filterType === 'all' ? characters : 
                characters.filter(c => c.role_type === filterType);
            
            const typeNames = {
                'protagonist': '主角',
                'antagonist': '反派', 
                'supporting': '配角'
            };
            
            container.innerHTML = `
                <div class="header">
                    <h2>👤 角色管理</h2>
                    <button class="btn btn-primary" onclick="openCharacterModal()">➕ 新建角色</button>
                </div>
                
                <div class="tabs">
                    <div class="tab ${filterType === 'all' ? 'active' : ''}" onclick="renderCharacters(document.getElementById('mainContent'), 'all')">全部</div>
                    <div class="tab ${filterType === 'protagonist' ? 'active' : ''}" onclick="renderCharacters(document.getElementById('mainContent'), 'protagonist')">主角</div>
                    <div class="tab ${filterType === 'antagonist' ? 'active' : ''}" onclick="renderCharacters(document.getElementById('mainContent'), 'antagonist')">反派</div>
                    <div class="tab ${filterType === 'supporting' ? 'active' : ''}" onclick="renderCharacters(document.getElementById('mainContent'), 'supporting')">配角</div>
                </div>
                
                ${filtered.length === 0 ? `
                    <div class="empty-state">
                        <div class="empty-state-icon">👤</div>
                        <h3>暂无角色</h3>

        function searchTropes() {
            tropeSearchQuery = document.getElementById('tropeSearch')?.value || '';
            renderPlot(document.getElementById('mainContent'));
        }
        
        function renderTropeItems() {
            let filtered = tropesData.tropes;
            
            if (currentTropeFilter !== 'all') {
                filtered = filtered.filter(t => t.category === currentTropeFilter);
            }
            
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(q) ||
                    t.content.toLowerCase().includes(q) ||
                    t.subType.toLowerCase().includes(q)
                );
            }
            
            if (filtered.length === 0) {
                return '<div style="text-align:center;color:#888;padding:20px;">暂无匹配桥段</div>';
            }
            
            return filtered.map(trope => {
                const category = tropesData.categories.find(c => c.id === trope.category);
                return `
                    <div class="trope-item">
                        <div class="trope-item-header">
                            <span class="trope-item-type">${category?.name || trope.category}</span>
                            <span style="font-size:11px;color:#888;">${trope.subType}</span>
                        </div>
                        <div class="trope-item-title">${trope.title}</div>
                        <div class="trope-item-content">${trope.content}</div>
                        <div class="trope-item-footer">
                            <span style="font-size:11px;color:#666;">《${trope.book}》${trope.author}</span>
                            <button class="btn-copy" onclick="copyTropeContent('${trope.title}', '${trope.content.replace(/'/g, "\\'")}')">复制</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function copyTropeContent(title, content) {
            const text = `${title}：${content}`;
            navigator.clipboard.writeText(text).then(() => {
                showNotification('桥段已复制到剪贴板');
            });
        }
        
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #e94560;
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 3000;
                font-size: 14px;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function openPlotModal(plot = null, defaultVolume = 1) {
            const isEdit = !!plot;
            document.getElementById('modalTitle').textContent = isEdit ? '编辑章节' : '添加章节';
            
            document.getElementById('modalBody').innerHTML = `
                <form id="plotForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>分卷</label>
                            <select name="volume">
                                ${[1,2,3,4,5,6,7].map(v => `
                                    <option value="${v}" ${(plot?.volume || defaultVolume) === v ? 'selected' : ''}>第${v}卷</option>
                                `).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>章节号</label>
                            <input type="number" name="chapter" value="${plot?.chapter || ''}" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>章节标题</label>
                        <input type="text" name="title" value="${plot?.title || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>状态</label>
                        <select name="status">
                            <option value="draft" ${plot?.status === 'draft' ? 'selected' : ''}>草稿</option>
                            <option value="writing" ${plot?.status === 'writing' ? 'selected' : ''}>写作中</option>
                            <option value="completed" ${plot?.status === 'completed' ? 'selected' : ''}>已完成</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>章节概要</label>
                        <textarea name="summary" rows="6">${plot?.summary || ''}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>场景列表（每行一个）</label>
                        <textarea name="scenes" rows="4">${plot?.scenes?.join('\n') || ''}</textarea>
                    </div>
                    
                    ${isEdit ? `<input type="hidden" name="id" value="${plot.id}">` : ''}
                </form>
            `;
            
            modalCallback = async () => {
                const form = document.getElementById('plotForm');
                const formData = new FormData(form);
                const data = {
                    volume: parseInt(formData.get('volume')),
                    chapter: parseInt(formData.get('chapter')),
                    title: formData.get('title'),
                    status: formData.get('status'),
                    summary: formData.get('summary'),
                    scenes: formData.get('scenes').split('\n').filter(s => s.trim()),
                    characters: plot?.characters || []
                };
                
                if (isEdit) {
                    data.id = parseInt(formData.get('id'));
                    await db.update('plots', data);
                } else {
                    await db.add('plots', data);
                }
                
                closeModal();
                renderPlot(document.getElementById('mainContent'), data.volume);
            };
            
            document.getElementById('modal').classList.add('active');
        }
        
        async function editPlot(id) {
            const plot = await db.get('plots', id);
            openPlotModal(plot, plot.volume);
        }
        
        async function deletePlot(id, title) {
            if (confirm(`确定要删除章节「${title}」吗？`)) {
                await db.delete('plots', id);
                renderPlot(document.getElementById('mainContent'));
            }
        }
        
        // ==================== 数据管理 ====================
        async function renderData(container) {
            const chars = await db.getAll('characters');
            const world = await db.getAll('world_settings');
            const plots = await db.getAll('plots');
            
            container.innerHTML = `
                <div class="header">
                    <h2>💾 数据管理</h2>
                </div>
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">📊 数据概览</span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 0;">
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${chars.length}</div>
                            <div style="color: #888; margin-top: 5px;">角色数量</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${world.length}</div>
                            <div style="color: #888; margin-top: 5px;">世界观设定</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${plots.length}</div>
                            <div style="color: #888; margin-top: 5px;">章节数量</div>
                        </div>
                    </div>
                </div>
                
                <div class="data-ops">
                    <button class="btn btn-primary" onclick="exportData()">📤 导出数据</button>
                    <button class="btn btn-secondary" onclick="importData()">📥 导入数据</button>
                    <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
                </div>
                
                <input type="file" id="importFile" style="display: none" accept=".json" onchange="handleImport(event)">
            `;
        }
        
        async function exportData() {
            const data = await db.exportAll();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novel_data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData() {
            document.getElementById('importFile').click();
        }
        
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!confirm('导入数据将覆盖现有数据，是否继续？')) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.importAll(data);
                    alert('数据导入成功！');
                    loadPage('data');
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            if (!confirm('真的确定吗？所有角色、世界观、情节都将被删除！')) return;
            
            await db.clear('characters');
            await db.clear('world_settings');
            await db.clear('plots');
            alert('数据已清空');
            loadPage('data');
        }
        
        // ==================== 模态框控制 ====================
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            modalCallback = null;
        }
        
        function confirmModal() {
            if (modalCallback) {
                modalCallback();
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
