        function filterTropes(category) {
            currentTropeFilter = category;
            currentSubTypeFilter = null;
            currentTropeDetail = null;
            renderPlot(document.getElementById('mainContent'));
        }
        
        function searchTropes() {
            tropeSearchQuery = document.getElementById('tropeSearch')?.value || '';
            renderPlot(document.getElementById('mainContent'));
        }
        
        function renderTropeItems() {
            if (!tropesData) {
                return '<div style="text-align:center;color:#888;padding:20px;">加载中...</div>';
            }

            // 第三级：桥段列表（带编号）
            if (currentSubTypeFilter) {
                let filtered = tropesData.tropes || [];
                
                if (currentTropeFilter !== 'all') {
                    filtered = filtered.filter(t => t.category === currentTropeFilter);
                }
                filtered = filtered.filter(t => t.subType === currentSubTypeFilter);
                
                if (tropeSearchQuery) {
                    const q = tropeSearchQuery.toLowerCase();
                    filtered = filtered.filter(t => 
                        t.title.toLowerCase().includes(q) ||
                        t.content.toLowerCase().includes(q)
                    );
                }
                
                const catName = tropesData.categories?.find(c => c.id === currentTropeFilter)?.name || currentTropeFilter;
                
                let html = `
                    <div style="margin-bottom:15px;padding:10px;background:#0f3460;border-radius:8px;">
                        <span style="color:#888;cursor:pointer;" onclick="filterTropes('${currentTropeFilter}')">${catName}</span>
                        <span style="color:#666;margin:0 8px;">></span>
                        <span style="color:#00d4ff;">${currentSubTypeFilter}</span>
                        <span style="margin-left:10px;color:#888;font-size:12px;">(${filtered.length}个桥段)</span>
                        <button onclick="filterTropes('${currentTropeFilter}')" style="margin-left:10px;background:none;border:none;color:#e94560;cursor:pointer;font-size:12px;">返回</button>
                    </div>
                `;
                
                if (filtered.length === 0) {
                    return html + '<div style="text-align:center;color:#888;padding:20px;">该类型暂无桥段素材</div>';
                }
                
                return html + filtered.map((trope, index) => {
                    // 只显示标题和序号，点击后弹出详情
                    return `
                        <div class="trope-item" style="cursor:pointer;" onclick='openTropeDetailModal(${JSON.stringify(trope).replace(/'/g, "&#39;")})'>
                            <div class="trope-item-header">
                                <span style="background:#e94560;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold;">${index + 1}</span>
                                <span class="trope-item-title" style="margin-left:10px;">${trope.title}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 第二级：小类型网格
            let categoriesToShow = tropesData.categories || [];
            
            if (currentTropeFilter !== 'all') {
                categoriesToShow = categoriesToShow.filter(c => c.id === currentTropeFilter);
            }
            
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                categoriesToShow = categoriesToShow.filter(c => 
                    c.name.toLowerCase().includes(q) ||
                    c.subTypes?.some(s => s.name.toLowerCase().includes(q))
                );
            }
            
            if (categoriesToShow.length === 0) {
                return '<div style="text-align:center;color:#888;padding:20px;">暂无匹配类别</div>';
            }
            
            let html = '';
            categoriesToShow.forEach(cat => {
                if (cat.subTypes && cat.subTypes.length > 0) {
                    html += `
                        <div style="margin-bottom:20px;">
                            <div style="font-size:14px;font-weight:600;color:#e94560;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #333;">
                                ${cat.name}
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
                                ${cat.subTypes.map(sub => {
                                    // 统计该子类型下的桥段数量
                                    const count = (tropesData.tropes || []).filter(t => 
                                        t.category === cat.id && t.subType === sub.name
                                    ).length;
                                    return `
                                        <div class="trope-item" style="padding:12px;cursor:pointer;text-align:center;" onclick="selectSubType('${cat.id}', '${sub.name.replace(/'/g, "\\'")}')">
                                            <div style="font-size:13px;font-weight:500;color:#fff;margin-bottom:4px;">${sub.name}</div>
                                            <div style="font-size:11px;color:#888;">${sub.frequency || '中'}频 · ${count}个示例</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            return html || '<div style="text-align:center;color:#888;padding:20px;">暂无子类型</div>';
        }
        
        // 选择子类型
        async function selectSubType(categoryId, subTypeName) {
            currentTropeFilter = categoryId;
            currentSubTypeFilter = subTypeName;
            currentTropeDetail = null;
            // 根据当前页面决定渲染方式
            if (currentPage === 'plot') {
                await renderPlot(document.getElementById('mainContent'));
            } else {
                await renderTrope(document.getElementById('mainContent'));
            }
        }
        
        // 打开桥段详情弹窗
        function openTropeDetailModal(trope) {
            currentTropeDetail = trope;
            
            document.getElementById('tropeDetailTitle').textContent = trope.title;
            document.getElementById('tropeDetailContent').textContent = trope.content;
            document.getElementById('tropeDetailSource').textContent = `《${trope.book}》${trope.author} · ${trope.year}年`;
            
            // 渲染标签
            const tagsContainer = document.getElementById('tropeDetailTags');
            if (trope.tags && trope.tags.length > 0) {
                tagsContainer.innerHTML = trope.tags.map(tag => 
                    `<span class="trope-detail-tag">${tag}</span>`
                ).join('');
            } else {
                tagsContainer.innerHTML = '';
            }
            
            document.getElementById('tropeDetailModal').classList.add('active');
        }
        
        // 关闭桥段详情弹窗
        function closeTropeDetailModal() {
            document.getElementById('tropeDetailModal').classList.remove('active');
            currentTropeDetail = null;
        }
        
        // 点击遮罩层关闭弹窗
        function closeTropeDetailModalOnOverlay(event) {
            if (event.target.id === 'tropeDetailModal') {
                closeTropeDetailModal();
            }
        }
        
        // 复制桥段内容
        function copyTropeDetailContent() {
            if (!currentTropeDetail) return;
            
            const text = `${currentTropeDetail.title}：${currentTropeDetail.content}`;
            navigator.clipboard.writeText(text).then(() => {
                showNotification('桥段已复制到剪贴板');
            }).catch(err => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showNotification('桥段已复制到剪贴板');
            });
        }
        
        function copyTropeContent(title, content) {
            const text = `${title}：${content}`;
            navigator.clipboard.writeText(text).then(() => {
                showNotification('桥段已复制到剪贴板');
            });
        }
        
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #e94560;
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 3000;
                font-size: 14px;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        function openPlotModal(plot = null, defaultVolume = 1) {
            const isEdit = !!plot;
            document.getElementById('modalTitle').textContent = isEdit ? '编辑章节' : '添加章节';
            
            document.getElementById('modalBody').innerHTML = `
                <form id="plotForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>分卷</label>
                            <select name="volume">
                                ${[1,2,3,4,5,6,7].map(v => `
                                    <option value="${v}" ${(plot?.volume || defaultVolume) === v ? 'selected' : ''}>第${v}卷</option>
                                `).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>章节号</label>
                            <input type="number" name="chapter" value="${plot?.chapter || ''}" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>章节标题</label>
                        <input type="text" name="title" value="${plot?.title || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>状态</label>
                        <select name="status">
                            <option value="draft" ${plot?.status === 'draft' ? 'selected' : ''}>草稿</option>
                            <option value="writing" ${plot?.status === 'writing' ? 'selected' : ''}>写作中</option>
                            <option value="completed" ${plot?.status === 'completed' ? 'selected' : ''}>已完成</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>章节概要</label>
                        <textarea name="summary" rows="6">${plot?.summary || ''}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>场景列表（每行一个）</label>
                        <textarea name="scenes" rows="4">${plot?.scenes?.join('\n') || ''}</textarea>
                    </div>
                    
                    ${isEdit ? `<input type="hidden" name="id" value="${plot.id}">` : ''}
                </form>
            `;
            
            modalCallback = async () => {
                const form = document.getElementById('plotForm');
                const formData = new FormData(form);
                const data = {
                    volume: parseInt(formData.get('volume')),
                    chapter: parseInt(formData.get('chapter')),
                    title: formData.get('title'),
                    status: formData.get('status'),
                    summary: formData.get('summary'),
                    scenes: formData.get('scenes').split('\n').filter(s => s.trim()),
                    characters: plot?.characters || []
                };
                
                if (isEdit) {
                    data.id = parseInt(formData.get('id'));
                    await db.update('plots', data);
                } else {
                    await db.add('plots', data);
                }
                
                closeModal();
                renderPlot(document.getElementById('mainContent'), data.volume);
            };
            
            document.getElementById('modal').classList.add('active');
        }
        
        async function editPlot(id) {
            const plot = await db.get('plots', id);
            openPlotModal(plot, plot.volume);
        }
        
        async function deletePlot(id, title) {
            if (confirm(`确定要删除章节「${title}」吗？`)) {
                await db.delete('plots', id);
                renderPlot(document.getElementById('mainContent'));
            }
        }
        
        // ==================== 桥段素材 ====================
        async function renderTrope(container) {
            const categories = tropesData?.categories || [];
            
            // 渲染类别筛选按钮
            const filterButtons = categories.map(cat => `
                <button class="tab ${currentTropeFilter === cat.id ? 'active' : ''}" onclick="filterTropeByCategory('${cat.id}')">
                    ${cat.name}
                </button>
            `).join('');
            
            container.innerHTML = `
                <div class="header" style="flex-direction: column; align-items: flex-start;">
                    <h2>🎭 桥段素材库</h2>
                    <p style="color: #888; font-size: 13px; margin-top: 5px;">${categories.length}个类别 · 共收录经典桥段子类型</p>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="tab ${currentTropeFilter === 'all' ? 'active' : ''}" onclick="filterTropeByCategory('all')">全部</button>
                    ${filterButtons}
                </div>
                
                <div style="margin-bottom: 20px;">
                    <input type="text" id="tropeSearch" placeholder="搜索桥段类别或子类型..." 
                        style="width: 100%; padding: 10px 15px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #fff;"
                        value="${tropeSearchQuery}"
                        oninput="onTropeSearch(this.value)"
                    >
                </div>
                
                <div id="tropeContent">
                    ${renderTropeContent()}
                </div>
            `;
        }
        
        function renderTropeContent() {
            if (!tropesData || !tropesData.categories) {
                return '<div style="text-align:center;color:#888;padding:40px;">加载中...</div>';
            }
            
            // 第三级：桥段列表（带编号）
            if (currentSubTypeFilter) {
                let filtered = tropesData.tropes || [];
                
                if (currentTropeFilter !== 'all') {
                    filtered = filtered.filter(t => t.category === currentTropeFilter);
                }
                filtered = filtered.filter(t => t.subType === currentSubTypeFilter);
                
                if (tropeSearchQuery) {
                    const q = tropeSearchQuery.toLowerCase();
                    filtered = filtered.filter(t => 
                        t.title.toLowerCase().includes(q) ||
                        t.content.toLowerCase().includes(q)
                    );
                }
                
                const catName = tropesData.categories?.find(c => c.id === currentTropeFilter)?.name || currentTropeFilter;
                
                let html = `
                    <div style="margin-bottom:15px;padding:10px;background:#0f3460;border-radius:8px;">
                        <span style="color:#888;cursor:pointer;" onclick="filterTropeByCategory('${currentTropeFilter}')">${catName}</span>
                        <span style="color:#666;margin:0 8px;">></span>
                        <span style="color:#00d4ff;">${currentSubTypeFilter}</span>
                        <span style="margin-left:10px;color:#888;font-size:12px;">(${filtered.length}个桥段)</span>
                        <button onclick="filterTropeByCategory('${currentTropeFilter}')" style="margin-left:10px;background:none;border:none;color:#e94560;cursor:pointer;font-size:12px;">返回</button>
                    </div>
                `;
                
                if (filtered.length === 0) {
                    return html + '<div style="text-align:center;color:#888;padding:20px;">该类型暂无桥段素材</div>';
                }
                
                return html + filtered.map((trope, index) => {
                    // 只显示标题和序号，点击后弹出详情
                    return `
                        <div class="trope-item" style="cursor:pointer;" onclick='openTropeDetailModal(${JSON.stringify(trope).replace(/'/g, "&#39;")})'>
                            <div class="trope-item-header">
                                <span style="background:#e94560;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold;">${index + 1}</span>
                                <span class="trope-item-title" style="margin-left:10px;">${trope.title}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            let categoriesToShow = tropesData.categories;
            
            // 按类别筛选
            if (currentTropeFilter !== 'all') {
                categoriesToShow = categoriesToShow.filter(c => c.id === currentTropeFilter);
            }
            
            // 按搜索词筛选
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                categoriesToShow = categoriesToShow.filter(c => 
                    c.name.toLowerCase().includes(q) ||
                    c.subTypes?.some(s => s.name.toLowerCase().includes(q))
                );
            }
            
            if (categoriesToShow.length === 0) {
                return '<div style="text-align:center;color:#888;padding:40px;">未找到匹配的桥段类别</div>';
            }
            
            return categoriesToShow.map(cat => {
                let subTypes = cat.subTypes || [];
                
                // 如果搜索词匹配子类型，高亮显示
                if (tropeSearchQuery) {
                    const q = tropeSearchQuery.toLowerCase();
                    subTypes = subTypes.filter(s => 
                        s.name.toLowerCase().includes(q) ||
                        cat.name.toLowerCase().includes(q)
                    );
                }
                
                if (subTypes.length === 0) return '';
                
                return `
                    <div style="margin-bottom: 24px; background: #1a1a2e; border-radius: 10px; padding: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #333;">
                            <div style="font-size: 15px; font-weight: 600; color: #e94560;">
                                ${cat.name}
                            </div>
                            <div style="font-size: 12px; color: #888;">
                                ${subTypes.length}个
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;">
                            ${subTypes.map(sub => `
                                <div class="trope-item" style="padding: 12px; cursor: pointer; transition: all 0.2s;" onclick="selectSubType('${cat.id}', '${sub.name.replace(/'/g, "\\'")}')">
                                    <div style="font-size: 13px; font-weight: 500; color: #fff;">${sub.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterTropeByCategory(categoryId) {
            currentTropeFilter = categoryId;
            currentSubTypeFilter = null;
            currentTropeDetail = null;
            renderTrope(document.getElementById('mainContent'));
        }
        
        function onTropeSearch(query) {
            tropeSearchQuery = query;
            const contentDiv = document.getElementById('tropeContent');
            if (contentDiv) {
                contentDiv.innerHTML = renderTropeContent();
            }
        }

        // ==================== 数据管理 ====================
        async function renderData(container) {
            const chars = await db.getAll('characters');
            const world = await db.getAll('world_settings');
            const plots = await db.getAll('plots');
            
            const githubSection = githubSync.isConfigured() ? `
                <div class="card" style="margin-bottom: 30px; border-left: 3px solid #28a745;">
                    <div class="card-header">
                        <span class="card-title">☁️ GitHub 云同步</span>
                        <span class="card-type" style="background: rgba(40, 167, 69, 0.2); color: #28a745;">已启用</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                            <div>
                                <div style="color: #888; font-size: 12px;">上次同步</div>
                                <div style="color: #fff; font-size: 14px;">${githubSync.lastSyncTime ? new Date(githubSync.lastSyncTime).toLocaleString('zh-CN') : '从未'}</div>
                            </div>
                            <div>
                                <div style="color: #888; font-size: 12px;">Gist ID</div>
                                <div style="color: #888; font-size: 12px; word-break: break-all;">${githubSync.gistId || '未创建'}</div>
                            </div>
                        </div>
                        <div class="data-ops">
                            <button class="btn btn-success" onclick="syncToGitHub()">📤 立即同步到云端</button>
                            <button class="btn btn-secondary" onclick="syncFromGitHub()">📥 从云端恢复</button>
                            <button class="btn btn-secondary" onclick="openGitHubSettings()">⚙️ 同步设置</button>
                        </div>
                    </div>
                </div>
            ` : `
                <div class="card" style="margin-bottom: 30px; border-left: 3px solid #ffc107;">
                    <div class="card-header">
                        <span class="card-title">☁️ GitHub 云同步</span>
                        <span class="card-type" style="background: rgba(255, 193, 7, 0.2); color: #ffc107;">未启用</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <p style="color: #888; margin-bottom: 15px; font-size: 14px;">
                            启用云同步后，你的写作数据将自动备份到 GitHub Gist，可在多台设备间同步。
                        </p>
                        <button class="btn btn-primary" onclick="openGitHubSettings()">🔐 启用云同步</button>
                    </div>
                </div>
            `;
            
            container.innerHTML = `
                <div class="header">
                    <h2>💾 数据管理</h2>
                </div>
                
                ${githubSection}
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">📊 数据概览</span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 0;">
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${chars.length}</div>
                            <div style="color: #888; margin-top: 5px;">角色数量</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${world.length}</div>
                            <div style="color: #888; margin-top: 5px;">世界观设定</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${plots.length}</div>
                            <div style="color: #888; margin-top: 5px;">章节数量</div>
                        </div>
                    </div>
                </div>
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">💾 本地数据操作</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <div class="data-ops">
                            <button class="btn btn-primary" onclick="exportData()">📤 导出数据</button>
                            <button class="btn btn-secondary" onclick="importData()">📥 导入数据</button>
                            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
                        </div>
                    </div>
                </div>
                
                <input type="file" id="importFile" style="display: none" accept=".json" onchange="handleImport(event)">
            `;
        }
        
        async function exportData() {
            const data = await db.exportAll();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novel_data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData() {
            document.getElementById('importFile').click();
        }
        
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!confirm('导入数据将覆盖现有数据，是否继续？')) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.importAll(data);
                    alert('数据导入成功！');
                    loadPage('data');
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            if (!confirm('真的确定吗？所有角色、世界观、情节都将被删除！')) return;
            
            await db.clear('characters');
            await db.clear('world_settings');
            await db.clear('plots');
            alert('数据已清空');
            loadPage('data');
        }
        
        // ==================== 模态框控制 ====================
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            modalCallback = null;
        }
        
        function confirmModal() {
            if (modalCallback) {
                modalCallback();
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // ESC键关闭桥段详情弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeTropeDetailModal();
            }
        });
    </script>
</body>
</html>
