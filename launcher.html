<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 创世者编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e; color: #fff; min-height: 100vh;
        }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 220px; background: #16213e; padding: 20px 0;
            display: flex; flex-direction: column;
        }
        .logo { text-align: center; padding: 0 20px 30px; border-bottom: 1px solid #0f3460; }
        .logo h1 { font-size: 24px; color: #00d4ff; margin-bottom: 5px; }
        .logo p { font-size: 12px; color: #888; }
        .nav-menu { flex: 1; padding: 20px 10px; }
        .nav-item {
            display: block; padding: 12px 20px; margin: 5px 10px;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
            color: #ccc; text-decoration: none; font-size: 14px;
        }
        .nav-item:hover { background: #0f3460; color: #fff; }
        .nav-item.active { background: #e94560; color: #fff; }
        .nav-item i { margin-right: 10px; font-style: normal; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #16213e;
        }
        .header h2 { font-size: 24px; font-weight: 600; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #d63a54; }
        .btn-secondary { background: #0f3460; color: #fff; }
        .btn-secondary:hover { background: #1a4a7a; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-success:hover { background: #218838; }
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
        }
        .card {
            background: #16213e; border-radius: 12px; padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 15px;
        }
        .card-title { font-size: 18px; font-weight: 600; color: #fff; }
        .card-type {
            font-size: 12px; padding: 4px 10px; border-radius: 20px;
            background: #0f3460; color: #00d4ff;
        }
        .card-content {
            color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 15px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 15px; border-top: 1px solid #0f3460;
        }
        .card-actions { display: flex; gap: 10px; }
        .card-actions button { padding: 6px 12px; font-size: 12px; }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #16213e; border-radius: 16px; width: 90%;
            max-width: 700px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            padding: 20px 30px; border-bottom: 1px solid #0f3460;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 20px; }
        .modal-close {
            background: none; border: none; color: #888; font-size: 24px; cursor: pointer;
        }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; color: #ccc; font-size: 14px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 15px; background: #1a1a2e;
            border: 1px solid #0f3460; border-radius: 8px; color: #fff;
            font-size: 14px; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #00d4ff;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .modal-footer {
            padding: 20px 30px; border-top: 1px solid #0f3460;
            display: flex; justify-content: flex-end; gap: 10px;
        }
        .trope-detail-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 1500; justify-content: center; align-items: center;
        }
        .trope-detail-modal.active { display: flex; }
        .trope-detail-content {
            background: #16213e; border-radius: 16px; width: 90%;
            max-width: 600px; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .trope-detail-header {
            padding: 24px 30px 16px; border-bottom: 1px solid #0f3460;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .trope-detail-header h3 { font-size: 20px; color: #fff; margin: 0; flex: 1; padding-right: 15px; }
        .trope-detail-close {
            background: none; border: none; color: #888; font-size: 28px;
            cursor: pointer; padding: 0; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all 0.2s;
        }
        .trope-detail-close:hover { color: #fff; background: rgba(233, 69, 96, 0.2); }
        .trope-detail-body { padding: 24px 30px; }
        .trope-detail-content-text {
            background: #1a1a2e; border: 1px solid #0f3460; border-radius: 10px;
            padding: 20px; line-height: 1.8; color: #ddd; font-size: 14px;
            margin-bottom: 20px; white-space: pre-wrap; word-wrap: break-word;
        }
        .trope-detail-source {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            padding: 12px 15px; background: rgba(0, 212, 255, 0.1);
            border-radius: 8px; border-left: 3px solid #00d4ff;
        }
        .trope-detail-source-label { color: #00d4ff; font-size: 13px; font-weight: 500; }
        .trope-detail-source-info { color: #aaa; font-size: 13px; }
        .trope-detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .trope-detail-tag {
            padding: 5px 12px; background: rgba(233, 69, 96, 0.15);
            border-radius: 15px; font-size: 12px; color: #e94560;
        }
        .trope-detail-footer {
            padding: 16px 30px 24px; display: flex; justify-content: center; gap: 12px;
        }
        .trope-detail-btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .trope-detail-btn-copy { background: #e94560; color: #fff; }
        .trope-detail-btn-copy:hover { background: #d63a54; }
        .trope-detail-btn-close { background: #0f3460; color: #fff; }
        .trope-detail-btn-close:hover { background: #1a4a7a; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #fff; }
        .empty-state p { color: #888; margin-bottom: 30px; }
        .tabs {
            display: flex; gap: 5px; margin-bottom: 30px;
            background: #16213e; padding: 5px; border-radius: 10px;
        }
        .tab {
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            color: #888; transition: all 0.3s;
        }
        .tab:hover { color: #fff; }
        .tab.active { background: #e94560; color: #fff; }
        .list-view { background: #16213e; border-radius: 12px; overflow: hidden; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid #0f3460;
            cursor: pointer; transition: background 0.2s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: #1a2a4a; }
        .list-item-info h4 { font-size: 16px; margin-bottom: 5px; }
        .list-item-info p { font-size: 13px; color: #888; }
        .list-item-actions { display: flex; gap: 8px; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 45px;
            background: #16213e; border: 1px solid #0f3460;
            border-radius: 10px; color: #fff; font-size: 14px;
        }
        .search-box::before {
            content: "🔍"; position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
        }
        .data-ops { display: flex; gap: 10px; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .trope-panel {
            width: 0; min-width: 0; background: #16213e;
            border-radius: 12px; overflow: hidden;
            transition: all 0.3s ease; opacity: 0;
        }
        .trope-panel.active { width: 380px; min-width: 380px; opacity: 1; }
        .trope-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-bottom: 1px solid #0f3460;
        }
        .trope-panel-header h3 { font-size: 16px; color: #00d4ff; }
        .trope-panel-body {
            padding: 15px; height: calc(100vh - 250px); overflow-y: auto;
        }
        .trope-categories {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
        }
        .trope-cat-tag {
            padding: 6px 12px; background: #1a1a2e; border-radius: 15px;
            font-size: 12px; color: #888; cursor: pointer;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .trope-cat-tag:hover { background: #0f3460; color: #fff; }
        .trope-cat-tag.active { background: #e94560; color: #fff; border-color: #e94560; }
        .trope-list { display: flex; flex-direction: column; gap: 12px; }
        .trope-item {
            background: #1a1a2e; border-radius: 10px; padding: 15px;
            border: 1px solid #0f3460; transition: all 0.2s;
        }
        .trope-item:hover { border-color: #00d4ff; transform: translateX(-2px); }
        .trope-item-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .trope-item-type {
            font-size: 11px; padding: 3px 8px;
            background: rgba(233, 69, 96, 0.2); color: #e94560; border-radius: 10px;
        }
        .trope-item-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .trope-item-content { font-size: 12px; color: #aaa; line-height: 1.6; margin-bottom: 10px; }
        .trope-item-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 10px; border-top: 1px solid #0f3460;
        }
        .btn-copy {
            padding: 4px 12px; background: #0f3460; color: #fff;
            border: none; border-radius: 6px; font-size: 11px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-copy:hover { background: #00d4ff; }
        .token-input-group { display: flex; gap: 10px; }
        .token-input-group input { flex: 1; }
        .token-status {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; padding: 4px 10px; border-radius: 4px;
        }
        .token-status.valid { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .token-status.invalid { background: rgba(220, 53, 69, 0.2); color: #dc3545; }
        .sync-status {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 15px; background: #1a1a2e; border-radius: 8px;
            margin-bottom: 20px; font-size: 13px;
        }
        .sync-status.synced { border-left: 3px solid #28a745; }
        .sync-status.unsynced { border-left: 3px solid #ffc107; }
        .sync-status.error { border-left: 3px solid #dc3545; }
        .github-setup-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .github-setup-modal.active { display: flex; }
        .github-setup-content {
            background: #16213e; border-radius: 16px; width: 90%;
            max-width: 500px; padding: 40px; text-align: center;
        }
        .github-setup-content h2 { color: #00d4ff; margin-bottom: 20px; }
        .github-setup-content p { color: #888; margin-bottom: 30px; line-height: 1.6; }
        .github-setup-content .form-group { text-align: left; }
        .help-text { font-size: 12px; color: #666; margin-top: 5px; }
        .help-text a { color: #00d4ff; }
        .loading-spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: rgba(233, 69, 96, 0.2); z-index: 3000; display: none;
        }
        .loading-bar.active { display: block; }
        .loading-bar-progress {
            height: 100%; background: linear-gradient(90deg, #e94560, #ff6b8a);
            width: 0%; transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .loading-status {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%); background: rgba(22, 33, 62, 0.95);
            padding: 10px 20px; border-radius: 20px; font-size: 13px;
            color: #fff; z-index: 3001; display: none;
            align-items: center; gap: 10px; border: 1px solid #0f3460;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .loading-status.active { display: flex; }
        .loading-status-error { background: rgba(220, 53, 69, 0.95); border-color: #dc3545; }
        .loading-status-success { background: rgba(40, 167, 69, 0.95); border-color: #28a745; }

        /* 数据加载覆盖层 */
        .data-loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 46, 0.95); z-index: 2500;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            gap: 20px;
        }
        .data-loading-overlay.active { display: flex; }
        .data-loading-content { text-align: center; max-width: 400px; padding: 30px; }
        .data-loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        .data-loading-text { font-size: 18px; color: #fff; margin-bottom: 10px; font-weight: 600; }
        .data-loading-subtext { font-size: 14px; color: #888; margin-bottom: 20px; }
        .data-loading-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .data-loading-stats { 
            font-size: 13px; color: #00d4ff; margin-top: 15px;
            padding: 10px 20px; background: rgba(0, 212, 255, 0.1); border-radius: 8px;
        }
        .data-loading-error { color: #e94560; font-size: 14px; margin-top: 10px; }

        /* 刷新按钮 */
        .refresh-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: #e94560; color: #fff; border: none;
            cursor: pointer; font-size: 20px; z-index: 100;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .refresh-btn:hover { transform: scale(1.1); background: #d63a54; }
        .refresh-btn.spinning { animation: spin 1s linear infinite; }

        /* 加载提示条 */
        .loading-hint {
            background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff;
            border-radius: 8px; padding: 15px 20px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .loading-hint-spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-hint-text { flex: 1; }
        .loading-hint-title { font-size: 14px; color: #fff; font-weight: 500; }
        .loading-hint-desc { font-size: 12px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h1>🎮 创世者</h1>
                <p>镜像囚笼 · 小说编辑器</p>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" data-page="home"><i>🏠</i>首页</a>
                <a class="nav-item" data-page="characters"><i>👤</i>角色管理</a>
                <a class="nav-item" data-page="world"><i>🌍</i>世界观</a>
                <a class="nav-item" data-page="plot"><i>📖</i>情节大纲</a>
                <a class="nav-item" data-page="trope"><i>🎭</i>桥段素材</a>
                <a class="nav-item" data-page="data"><i>💾</i>数据管理</a>
            </nav>
        </aside>
        <main class="main-content" id="mainContent"></main>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm" onclick="confirmModal()">保存</button>
            </div>
        </div>
    </div>

    <!-- 桥段详情弹窗 -->
    <div class="trope-detail-modal" id="tropeDetailModal" onclick="closeTropeDetailModalOnOverlay(event)">
        <div class="trope-detail-content" onclick="event.stopPropagation()">
            <div class="trope-detail-header">
                <h3 id="tropeDetailTitle">桥段标题</h3>
                <button class="trope-detail-close" onclick="closeTropeDetailModal()">&times;</button>
            </div>
            <div class="trope-detail-body">
                <div id="tropeDetailContent" class="trope-detail-content-text">桥段内容</div>
                <div class="trope-detail-source">
                    <span class="trope-detail-source-label">📚 出处</span>
                    <span id="tropeDetailSource" class="trope-detail-source-info">书名 · 作者 · 年份</span>
                </div>
                <div id="tropeDetailTags" class="trope-detail-tags"></div>
            </div>
            <div class="trope-detail-footer">
                <button class="trope-detail-btn trope-detail-btn-copy" onclick="copyTropeDetailContent()">📋 复制内容</button>
                <button class="trope-detail-btn trope-detail-btn-close" onclick="closeTropeDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 加载进度条 -->
    <div class="loading-bar" id="loadingBar">
        <div class="loading-bar-progress" id="loadingBarProgress"></div>
    </div>
    
    <!-- 加载状态提示 -->
    <div class="loading-status" id="loadingStatus">
        <span class="loading-spinner"></span>
        <span id="loadingStatusText">正在加载...</span>
    </div>
    
    <!-- 数据加载覆盖层 -->
    <div class="data-loading-overlay" id="dataLoadingOverlay">
        <div class="data-loading-content">
            <div class="data-loading-spinner"></div>
            <div class="data-loading-text" id="dataLoadingText">正在加载数据...</div>
            <div class="data-loading-subtext" id="dataLoadingSubtext">首次加载可能需要一些时间</div>
            <div class="data-loading-error" id="dataLoadingError"></div>
            <div class="data-loading-stats" id="dataLoadingStats"></div>
            <div class="data-loading-actions" id="dataLoadingActions" style="display:none;">
                <button class="btn btn-primary" onclick="retryLoadingData()">🔄 重试</button>
                <button class="btn btn-secondary" onclick="skipLoadingData()">⏭️ 跳过</button>
            </div>
        </div>
    </div>

    <!-- 强制刷新按钮 -->
    <button class="refresh-btn" id="refreshBtn" onclick="forceRefreshData()" title="强制刷新数据">🔄</button>

    <!-- GitHub Token 设置模态框 -->
    <div class="github-setup-modal" id="githubSetupModal">
        <div class="github-setup-content">
            <h2>🔐 GitHub 同步设置</h2>
            <p>为了实现跨设备数据同步，请输入你的 GitHub Personal Access Token。<br>数据将安全存储在你的私有 Gist 中。</p>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <div class="help-text">
                    没有 Token？<a href="https://github.com/settings/tokens/new?description=NovelEditor&scopes=gist" target="_blank">点击这里创建</a>（只需勾选 gist 权限）
                </div>
            </div>
            <div id="githubSetupError" style="color: #dc3545; margin-bottom: 15px; font-size: 14px; display: none;"></div>
            <button class="btn btn-primary" onclick="saveGitHubToken()" style="width: 100%;">保存并验证</button>
            <button class="btn btn-secondary" onclick="skipGitHubSetup()" style="width: 100%; margin-top: 10px; background: transparent;">稍后再说</button>
        </div>
    </div>

    <script>
        // ==================== 网络优化配置 ====================
        const NETWORK_CONFIG = {
            timeout: 30000,          // 30秒超时
            maxRetries: 3,           // 最大重试3次
            retryDelay: [1000, 2000, 4000],  // 指数退避延迟

        // ==================== IndexedDB 缓存管理 ====================
        class CacheManager {
            constructor() {
                this.dbName = 'NovelEditorCache';
                this.dbVersion = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('dataCache')) {
                            const store = db.createObjectStore('dataCache', { keyPath: 'key' });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                    };
                });
            }

            async get(key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('dataCache', 'readonly');
                    const store = tx.objectStore('dataCache');
                    const request = store.get(key);
                    request.onsuccess = () => {
                        const result = request.result;
                        if (result && result.version === NETWORK_CONFIG.cacheVersion) {
                            resolve(result.data);
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            async set(key, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('dataCache', 'readwrite');
                    const store = tx.objectStore('dataCache');
                    const request = store.put({
                        key: key,
                        data: data,
                        version: NETWORK_CONFIG.cacheVersion,
                        timestamp: Date.now()
                    });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async clear(key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('dataCache', 'readwrite');
                    const store = tx.objectStore('dataCache');
                    const request = store.delete(key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async clearAll() {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction('dataCache', 'readwrite');
                    const store = tx.objectStore('dataCache');
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // ==================== 网络请求工具（带超时、重试、指数退避）====================
        async function fetchWithRetry(url, options = {}) {
            const { timeout = NETWORK_CONFIG.timeout, retries = NETWORK_CONFIG.maxRetries } = options;
            let lastError;
            
            for (let i = 0; i < retries; i++) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                try {
                    console.log(`🌐 请求尝试 ${i + 1}/${retries}: ${url}`);
                    const response = await fetch(url, { 
                        signal: controller.signal,
                        cache: 'no-cache',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        console.log(`✅ 请求成功: ${url}`);
                        return response;
                    }
                    throw new Error(`HTTP ${response.status}`);
                } catch (error) {
                    clearTimeout(timeoutId);
                    lastError = error;
                    console.warn(`⚠️ 请求失败 (${i + 1}/${retries}): ${url}`, error.message);
                    
                    if (i < retries - 1) {
                        const delay = NETWORK_CONFIG.retryDelay[i] || NETWORK_CONFIG.retryDelay[NETWORK_CONFIG.retryDelay.length - 1];
                        console.log(`⏱️ 等待 ${delay}ms 后重试...`);
                        await new Promise(r => setTimeout(r, delay));
                    }
                }
            }
            
            console.error(`❌ 所有请求尝试失败: ${url}`, lastError);
            throw lastError;
        }

        // ==================== GitHub 同步模块 ====================
        class GitHubSync {
            constructor() {
                this.token = localStorage.getItem('github_token');
                this.gistId = localStorage.getItem('github_gist_id');
                this.lastSyncTime = localStorage.getItem('last_sync_time');
            }

            isConfigured() { return !!this.token; }

            saveToken(token) {
                this.token = token;
                localStorage.setItem('github_token', token);
            }

            async verifyToken() {
                if (!this.token) return false;
                try {
                    const response = await fetchWithRetry('https://api.github.com/user', {
                        retries: 2,
                        timeout: 15000
                    });
                    return response.ok;
                } catch (e) {
                    return false;
                }
            }

            async getOrCreateGist() {
                if (this.gistId) {
                    try {
                        const response = await fetchWithRetry(`https://api.github.com/gists/${this.gistId}`, {
                            retries: 2,
                            timeout: 15000
                        });
                        if (response.ok) return this.gistId;
                    } catch (e) {
                        console.error('Gist check failed:', e);
                    }
                }

                try {
                    const response = await fetchWithRetry('https://api.github.com/gists', {
                        retries: 2,
                        timeout: 20000
                    });
                    if (response.ok) {
                        const data = await response.json();
                        this.gistId = data.id;
                        localStorage.setItem('github_gist_id', data.id);
                        return data.id;
                    }
                } catch (e) {
                    console.error('Create gist failed:', e);
                    throw e;
                }
            }

            async loadFromGist() {
                if (!this.gistId || !this.token) return null;
                try {
                    const response = await fetchWithRetry(`https://api.github.com/gists/${this.gistId}`, {
                        retries: 2,
                        timeout: 20000
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const file = data.files['novel_editor_data.json'];
                        if (file) {
                            this.lastSyncTime = new Date().toISOString();
                            localStorage.setItem('last_sync_time', this.lastSyncTime);
                            return JSON.parse(file.content);
                        }
                    }
                } catch (e) {
                    console.error('Load from gist failed:', e);
                }
                return null;
            }

            async saveToGist(data) {
                const gistId = await this.getOrCreateGist();
                try {
                    const response = await fetchWithRetry(`https://api.github.com/gists/${gistId}`, {
                        retries: 2,
                        timeout: 20000
                    });
                    if (response.ok) {
                        this.lastSyncTime = new Date().toISOString();
                        localStorage.setItem('last_sync_time', this.lastSyncTime);
                        return true;
                    }
                } catch (e) {
                    console.error('Save to gist failed:', e);
                }
                return false;
            }

            clearConfig() {
                this.token = null;
                this.gistId = null;
                this.lastSyncTime = null;
                localStorage.removeItem('github_token');
                localStorage.removeItem('github_gist_id');
                localStorage.removeItem('last_sync_time');
            }
        }

        // ==================== 数据库模块 ====================
        class Database {
            constructor() {
                this.db = null;
                this.dbName = 'CreatorDB';
                this.dbVersion = 1;
                this.githubSync = new GitHubSync();
                this.syncEnabled = true;
            }
            
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('characters')) {
                            const charStore = db.createObjectStore('characters', { keyPath: 'id', autoIncrement: true });
                            charStore.createIndex('name', 'name', { unique: false });
                            charStore.createIndex('role', 'role', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('world_settings')) {
                            const worldStore = db.createObjectStore('world_settings', { keyPath: 'id', autoIncrement: true });
                            worldStore.createIndex('category', 'category', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('plots')) {
                            const plotStore = db.createObjectStore('plots', { keyPath: 'id', autoIncrement: true });
                            plotStore.createIndex('volume', 'volume', { unique: false });
                        }
                    };
                });
            }
            
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.created_at = new Date().toISOString();
                    data.updated_at = new Date().toISOString();
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async getAll(storeName, indexName = null, value = null) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    let request;
                    if (indexName && value !== null) {
                        const index = store.index(indexName);
                        request = index.getAll(value);
                    } else {
                        request = store.getAll();
                    }
                    request.onsuccess = () => {
                        const results = request.result.sort((a, b) => 
                            new Date(b.updated_at || 0) - new Date(a.updated_at || 0)
                        );
                        resolve(results);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async update(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updated_at = new Date().toISOString();
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // 内部：实际加载角色数据
        async function loadCharacterDataInternal(onProgress = null) {
            // 1. 先检查缓存
            const cachedData = await cacheManager.get('characters_all');
            if (cachedData) {
                console.log('✅ 从缓存加载角色数据');
                dataLoadState.characters.data = cachedData;
                dataLoadState.characters.cached = true;
                dataLoadState.characters.loaded = true;
                
                // 导入到IndexedDB
                await importCharactersToDB(cachedData.characters || [], onProgress);
                return;
            }
            
            // 2. 从网络加载
            console.log('🌐 从网络加载角色数据...');
            if (onProgress) onProgress(10, '正在连接服务器...');
            
            const response = await fetchWithRetry('characters_all.json?t=' + Date.now());
            
            if (response.ok) {
                const data = await response.json();
                if (onProgress) onProgress(50, `已获取 ${data.characters?.length || 0} 个角色`);
                
                // 保存到缓存
                await cacheManager.set('characters_all', data);
                dataLoadState.characters.data = data;
                
                // 导入到IndexedDB
                await importCharactersToDB(data.characters || [], onProgress);
                
                dataLoadState.characters.loaded = true;
                console.log(`✅ 角色数据加载完成: ${data.characters?.length || 0} 个角色`);
            }
        }

        // 导入角色到DB
        async function importCharactersToDB(characters, onProgress) {
            const existingChars = await db.getAll('characters');
            const existingNames = new Set(existingChars.map(c => c.name + '|' + c.book));
            
            let addedCount = 0;
            let skippedCount = 0;
            
            for (let i = 0; i < characters.length; i++) {
                const char = characters[i];
                const key = char.name + '|' + char.book;
                
                if (!existingNames.has(key)) {
                    await db.add('characters', char);
                    addedCount++;
                } else {
                    skippedCount++;
                }
                
                if (onProgress && i % 20 === 0) {
                    const progress = 50 + (i / characters.length) * 45;
                    onProgress(progress, `导入中... ${i}/${characters.length} (新增 ${addedCount})`);
                }
            }
            
            if (onProgress) onProgress(100, `完成！新增 ${addedCount} 个，跳过 ${skippedCount} 个`);
        }

                    const existingSettings = await db.getAll('world_settings');

                    for (let i = 0; i < worldviews.length; i++) {
                        const world = worldviews[i];

                        <span style="color:#666;margin:0 8px;">></span>
                        <span style="color:#00d4ff;">${currentSubTypeFilter}</span>
                        <button onclick="filterTropes('${currentTropeFilter}')" style="margin-left:10px;background:none;border:none;color:#e94560;cursor:pointer;font-size:12px;">返回</button>
                    </div>
                    <div class="trope-item" style="padding:12px;cursor:pointer;text-align:center;" onclick="useTrope('${currentSubTypeFilter.replace(/'/g, "\\'")}')">
                        <div style="font-size:13px;color:#fff;">使用「${currentSubTypeFilter}」桥段</div>
                    </div>
                `;
            }

            let categoriesToShow = tropesData.categories || [];
            if (currentTropeFilter !== 'all') {
                categoriesToShow = categoriesToShow.filter(c => c.id === currentTropeFilter);
            }
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                categoriesToShow = categoriesToShow.filter(c => 
                    c.name.toLowerCase().includes(q) ||
                    c.subTypes?.some(s => s.name.toLowerCase().includes(q))
                );
            }
            
            if (categoriesToShow.length === 0) {
                return '<div style="text-align:center;color:#888;padding:20px;">暂无匹配类别</div>';
            }
            
            let html = '';
            categoriesToShow.forEach(cat => {
                if (cat.subTypes && cat.subTypes.length > 0) {
                    html += `
                        <div style="margin-bottom:20px;">
                            <div style="font-size:14px;font-weight:600;color:#e94560;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #333;">
                                ${cat.name}
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
                                ${cat.subTypes.map(sub => `
                                    <div class="trope-item" style="padding:12px;cursor:pointer;text-align:center;" onclick="selectSubType('${cat.id}', '${sub.name.replace(/'/g, "\\'")}')">
                                        <div style="font-size:13px;font-weight:500;color:#fff;">${sub.name}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            return html || '<div style="text-align:center;color:#888;padding:20px;">暂无子类型</div>';
        }
        
        async function selectSubType(categoryId, subTypeName) {
            currentTropeFilter = categoryId;
            currentSubTypeFilter = subTypeName;
            await renderPlot(document.getElementById('mainContent'));
        }
        
        function useTrope(tropeName) {
            showNotification(`已选择桥段：${tropeName}`);
        }
        
        function openTropeDetailModal(trope) {
            currentTropeDetail = trope;
            document.getElementById('tropeDetailTitle').textContent = trope.title || trope.name || '桥段';
            document.getElementById('tropeDetailContent').textContent = trope.content || trope.description || '';
            document.getElementById('tropeDetailSource').textContent = trope.book ? `《${trope.book}》${trope.author || ''}` : '未知出处';
            
            const tagsContainer = document.getElementById('tropeDetailTags');
            if (trope.tags && trope.tags.length > 0) {
                tagsContainer.innerHTML = trope.tags.map(tag => `<span class="trope-detail-tag">${tag}</span>`).join('');
            } else {
                tagsContainer.innerHTML = '';
            }
            
            document.getElementById('tropeDetailModal').classList.add('active');
        }
        
        function closeTropeDetailModal() {
            document.getElementById('tropeDetailModal').classList.remove('active');
            currentTropeDetail = null;
        }
        
        function closeTropeDetailModalOnOverlay(event) {
            if (event.target.id === 'tropeDetailModal') closeTropeDetailModal();
        }
        
        function copyTropeDetailContent() {
            if (!currentTropeDetail) return;
            const text = `${currentTropeDetail.title || currentTropeDetail.name}：${currentTropeDetail.content || currentTropeDetail.description || ''}`;
            navigator.clipboard.writeText(text).then(() => showNotification('桥段已复制到剪贴板'));
        }
        
        function openPlotModal(plot = null, defaultVolume = 1) {
            const isEdit = !!plot;
            document.getElementById('modalTitle').textContent = isEdit ? '编辑章节' : '添加章节';
            
            document.getElementById('modalBody').innerHTML = `
                <form id="plotForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>分卷</label>
                            <select name="volume">
                                ${[1,2,3,4,5,6,7].map(v => `
                                    <option value="${v}" ${(plot?.volume || defaultVolume) === v ? 'selected' : ''}>第${v}卷</option>
                                `).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>章节号</label>
                            <input type="number" name="chapter" value="${plot?.chapter || ''}" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>章节标题</label>
                        <input type="text" name="title" value="${plot?.title || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select name="status">
                            <option value="draft" ${plot?.status === 'draft' ? 'selected' : ''}>草稿</option>
                            <option value="writing" ${plot?.status === 'writing' ? 'selected' : ''}>写作中</option>
                            <option value="completed" ${plot?.status === 'completed' ? 'selected' : ''}>已完成</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>章节概要</label>
                        <textarea name="summary" rows="6">${plot?.summary || ''}</textarea>
                    </div>
                    ${isEdit ? `<input type="hidden" name="id" value="${plot.id}">` : ''}
                </form>
            `;
            
            modalCallback = async () => {
                const form = document.getElementById('plotForm');
                const formData = new FormData(form);
                const data = {
                    volume: parseInt(formData.get('volume')),
                    chapter: parseInt(formData.get('chapter')),
                    title: formData.get('title'),
                    status: formData.get('status'),
                    summary: formData.get('summary')
                };
                
                if (isEdit) {
                    data.id = parseInt(formData.get('id'));
                    await db.update('plots', data);
                } else {
                    await db.add('plots', data);
                }
                
                closeModal();
                renderPlot(document.getElementById('mainContent'), data.volume);
            };
            
            document.getElementById('modal').classList.add('active');
        }
        
        async function editPlot(id) {
            const plot = await db.get('plots', id);
            openPlotModal(plot, plot.volume);
        }
        
        async function deletePlot(id, title) {
            if (confirm(`确定要删除章节「${title}」吗？`)) {
                await db.delete('plots', id);
                renderPlot(document.getElementById('mainContent'));
            }
        }
        
        // 桥段素材页面
        async function renderTrope(container) {
            if (!tropesData) {
                container.innerHTML = `
                    <div class="header"><h2>🎭 桥段素材库</h2></div>
                    <div class="empty-state">
                        <div class="loading-spinner" style="width:50px;height:50px;margin-bottom:20px;"></div>
                        <h3>正在加载桥段数据...</h3>
                    </div>
                `;
                return;
            }
            
            const categories = tropesData.categories || [];
            
            container.innerHTML = `
                <div class="header" style="flex-direction: column; align-items: flex-start;">
                    <h2>🎭 桥段素材库</h2>
                    <p style="color: #888; font-size: 13px; margin-top: 5px;">${categories.length}个类别</p>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="tab ${currentTropeFilter === 'all' ? 'active' : ''}" onclick="filterTropeByCategory('all')">全部</button>
                    ${categories.map(cat => `
                        <button class="tab ${currentTropeFilter === cat.id ? 'active' : ''}" onclick="filterTropeByCategory('${cat.id}')">${cat.name}</button>
                    `).join('')}
                </div>
                
                <div id="tropeContent">
                    ${renderTropeContent()}
                </div>
            `;
        }
        
        function renderTropeContent() {
            if (!tropesData || !tropesData.categories) {
                return '<div style="text-align:center;color:#888;padding:40px;">加载中...</div>';
            }
            
            let categoriesToShow = tropesData.categories;
            if (currentTropeFilter !== 'all') {
                categoriesToShow = categoriesToShow.filter(c => c.id === currentTropeFilter);
            }
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                categoriesToShow = categoriesToShow.filter(c => 
                    c.name.toLowerCase().includes(q) ||
                    c.subTypes?.some(s => s.name.toLowerCase().includes(q))
                );
            }
            
            if (categoriesToShow.length === 0) {
                return '<div style="text-align:center;color:#888;padding:40px;">未找到匹配的桥段类别</div>';
            }
            
            return categoriesToShow.map(cat => {
                let subTypes = cat.subTypes || [];
                if (tropeSearchQuery) {
                    const q = tropeSearchQuery.toLowerCase();
                    subTypes = subTypes.filter(s => s.name.toLowerCase().includes(q));
                }
                if (subTypes.length === 0) return '';
                
                return `
                    <div style="margin-bottom: 24px; background: #1a1a2e; border-radius: 10px; padding: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #333;">
                            <div style="font-size: 15px; font-weight: 600; color: #e94560;">${cat.name}</div>
                            <div style="font-size: 12px; color: #888;">${subTypes.length}个</div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;">
                            ${subTypes.map(sub => `
                                <div class="trope-item" style="padding: 12px; cursor: pointer; transition: all 0.2s;" onclick="showNotification('桥段：${sub.name.replace(/'/g, "\\'")}')">
                                    <div style="font-size: 13px; font-weight: 500; color: #fff;">${sub.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterTropeByCategory(categoryId) {
            currentTropeFilter = categoryId;
            currentSubTypeFilter = null;
            renderTrope(document.getElementById('mainContent'));
        }
        
        function onTropeSearch(query) {
            tropeSearchQuery = query;
            const contentDiv = document.getElementById('tropeContent');
            if (contentDiv) contentDiv.innerHTML = renderTropeContent();
        }

        // 数据管理页面
        async function renderData(container) {
            const chars = await db.getAll('characters');
            const world = await db.getAll('world_settings');
            const plots = await db.getAll('plots');
            
            container.innerHTML = `
                <div class="header">
                    <h2>💾 数据管理</h2>
                </div>
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">📊 数据概览</span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 0;">
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${chars.length}</div>
                            <div style="color: #888; margin-top: 5px;">角色数量</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${world.length}</div>
                            <div style="color: #888; margin-top: 5px;">世界观设定</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${plots.length}</div>
                            <div style="color: #888; margin-top: 5px;">章节数量</div>
                        </div>
                    </div>
                </div>
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">💾 本地数据操作</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <div class="data-ops">
                            <button class="btn btn-primary" onclick="exportData()">📤 导出数据</button>
                            <button class="btn btn-secondary" onclick="importData()">📥 导入数据</button>
                            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
                            <button class="btn btn-secondary" onclick="clearCacheOnly()">🧹 清除缓存</button>
                        </div>
                    </div>
                </div>
                
                <input type="file" id="importFile" style="display: none" accept=".json" onchange="handleImport(event)">
            `;
        }
        
        async function exportData() {
            const chars = await db.getAll('characters');
            const worlds = await db.getAll('world_settings');
            const plots = await db.getAll('plots');
            const data = {
                version: '1.0',
                export_time: new Date().toISOString(),
                characters: chars,
                world_settings: worlds,
                plots: plots
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novel_data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData() {
            document.getElementById('importFile').click();
        }
        
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('导入数据将覆盖现有数据，是否继续？')) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    await db.clear('characters');
                    await db.clear('world_settings');
                    await db.clear('plots');
                    
                    for (const char of data.characters || []) {
                        delete char.id;
                        await db.add('characters', char);
                    }
                    for (const setting of data.world_settings || []) {
                        delete setting.id;
                        await db.add('world_settings', setting);
                    }
                    for (const plot of data.plots || []) {
                        delete plot.id;
                        await db.add('plots', plot);
                    }
                    
                    showNotification('数据导入成功！');
                    loadPage('data');
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            if (!confirm('真的确定吗？所有角色、世界观、情节都将被删除！')) return;
            
            await db.clear('characters');
            await db.clear('world_settings');
            await db.clear('plots');
            await cacheManager.clearAll();
            
            dataLoadState.characters.loaded = false;
            dataLoadState.worldview.loaded = false;
            
            showNotification('数据已清空');
            loadPage('data');
        }

        async function clearCacheOnly() {
            await cacheManager.clearAll();
            dataLoadState.characters.cached = false;
            showNotification('缓存已清除');
        }
        
        // ==================== 模态框控制 ====================
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            modalCallback = null;
        }
        
        function confirmModal() {
            if (modalCallback) modalCallback();
        }

        // ==================== GitHub 设置 ====================
        function showGitHubSetupModal() {
            document.getElementById('githubSetupModal').classList.add('active');
        }

        function hideGitHubSetupModal() {
            document.getElementById('githubSetupModal').classList.remove('active');
            document.getElementById('githubSetupError').style.display = 'none';
        }

        function skipGitHubSetup() {
            hideGitHubSetupModal();
        }

        async function saveGitHubToken() {
            const token = document.getElementById('githubTokenInput').value.trim();
            const errorDiv = document.getElementById('githubSetupError');
            
            if (!token) {
                errorDiv.textContent = '请输入 GitHub Token';
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.querySelector('#githubSetupModal .btn-primary');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading-spinner"></span> 验证中...';
            btn.disabled = true;

            try {
                githubSync.saveToken(token);
                const valid = await githubSync.verifyToken();
                
                if (valid) {
                    await githubSync.getOrCreateGist();
                    hideGitHubSetupModal();
                    showNotification('GitHub Token 已保存');
                } else {
                    errorDiv.textContent = 'Token 验证失败，请检查是否正确';
                    errorDiv.style.display = 'block';
                    githubSync.clearConfig();
                }
            } catch (e) {
                errorDiv.textContent = '验证失败：' + e.message;
                errorDiv.style.display = 'block';
                githubSync.clearConfig();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function openGitHubSettings() {
            if (githubSync.isConfigured()) {
                showNotification('GitHub 已配置');
            } else {
                showGitHubSetupModal();
            }
        }
        
        // ==================== 页面加载 ====================
        function loadPage(page) {
            currentPage = page;
            const main = document.getElementById('mainContent');
            
            switch(page) {
                case 'home': renderHome(main); break;
                case 'characters': renderCharacters(main); break;
                case 'world': renderWorld(main); break;
                case 'plot': renderPlot(main); break;
                case 'trope': renderTrope(main); break;
                case 'data': renderData(main); break;
            }
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await db.init();
            await cacheManager.init();
            
            // 检查本地缓存
            const cachedChars = await db.getAll('characters');
            const cachedWorlds = await db.getAll('world_settings');
            
            if (cachedChars.length > 0) {
                dataLoadState.characters.loaded = true;
                console.log(`✅ 本地已有 ${cachedChars.length} 个角色`);
            }
            if (cachedWorlds.length > 0) {
                dataLoadState.worldview.loaded = true;
                console.log(`✅ 本地已有 ${cachedWorlds.length} 条世界观`);
            }
            
            // 加载桥段数据（首页需要）
            await loadTropeData();
            
            loadPage('home');
            
            // 导航事件
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const page = item.dataset.page;
                    
                    // 懒加载：进入角色页时加载角色数据
                    if (page === 'characters' && !dataLoadState.characters.loaded && !dataLoadState.characters.loading) {
                        loadCharacterDataWithUI();
                    }
                    // 懒加载：进入世界观页时加载世界观数据
                    else if (page === 'world' && !dataLoadState.worldview.loaded && !dataLoadState.worldview.loading) {
                        loadWorldviewDataWithUI();
                    }
                    
                    loadPage(page);
                });
            });

            // 点击模态框外部关闭
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target.id === 'modal') closeModal();
            });

            // ESC键关闭弹窗
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeTropeDetailModal();
            });
        });
    </script>
</body>
</html>
