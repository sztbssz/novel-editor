<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创世者编辑器 - 启动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }
        .command-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .command-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .command {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 16px;
            color: #00d4ff;
            word-break: break-all;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }
        .copy-btn {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            color: #fff;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        .copy-btn:active {
            transform: translateY(0);
        }
        .tips {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }
        .success-msg {
            color: #4ade80;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .success-msg.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>创世者编辑器</h1>
        <p class="subtitle">Novel Editor for 镜像囚笼</p>
        
        <div class="command-box">
            <div class="command-label">终端启动命令</div>
            <div class="command" id="command">cd ~/.openclaw/workspace/novel-editor && python creator.py</div>
            <button class="copy-btn" onclick="copyCommand()">复制命令</button>
            <div class="success-msg" id="success">✓ 已复制到剪贴板</div>
        </div>
        
        <div class="tips">
            <p>1. 点击「复制命令」按钮</p>
            <p>2. 打开终端（Terminal）</p>
            <p>3. 粘贴命令并回车运行</p>
        </div>
    </div>

    <script>
        function copyCommand() {
            const command = document.getElementById('command').innerText;
            navigator.clipboard.writeText(command).then(() => {
                const success = document.getElementById('success');
                success.classList.add('show');
                setTimeout(() => {
                    success.classList.remove('show');
                }, 2000);
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = command;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                const success = document.getElementById('success');
                success.classList.add('show');
                setTimeout(() => {
                    success.classList.remove('show');
                }, 2000);
            });
        }
    </script>
</body>
</html>
