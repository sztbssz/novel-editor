<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 创世者编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        /* 布局 */
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: #16213e;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid #0f3460;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #00d4ff;
            margin-bottom: 5px;
        }
        
        .logo p {
            font-size: 12px;
            color: #888;
        }
        
        .nav-menu {
            flex: 1;
            padding: 20px 10px;
        }
        
        .nav-item {
            display: block;
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-item:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .nav-item.active {
            background: #e94560;
            color: #fff;
        }
        
        .nav-item i {
            margin-right: 10px;
            font-style: normal;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #16213e;
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #d63a54;
        }
        
        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #1a4a7a;
        }
        
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        
        .btn-success {
            background: #28a745;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .card-type {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #0f3460;
            color: #00d4ff;
        }
        
        .card-content {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
        }
        
        .card-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-close:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #0f3460;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .empty-state p {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: #16213e;
            padding: 5px;
            border-radius: 10px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .tab.active {
            background: #e94560;
            color: #fff;
        }
        
        /* 列表视图 */
        .list-view {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item:hover {
            background: #1a2a4a;
        }
        
        .list-item-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .list-item-info p {
            font-size: 13px;
            color: #888;
        }
        
        .list-item-actions {
            display: flex;
            gap: 8px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        /* 数据操作 */
        .data-ops {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 桥段素材库面板样式 */
        .trope-panel {
            width: 0;
            min-width: 0;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .trope-panel.active {
            width: 380px;
            min-width: 380px;
            opacity: 1;
        }
        
        .trope-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .trope-panel-header h3 {
            font-size: 16px;
            color: #00d4ff;
        }
        
        .trope-panel-body {
            padding: 15px;
            height: calc(100vh - 250px);
            overflow-y: auto;
        }
        
        .trope-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .trope-cat-tag {
            padding: 6px 12px;
            background: #1a1a2e;
            border-radius: 15px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .trope-cat-tag:hover {
            background: #0f3460;
            color: #fff;
        }
        
        .trope-cat-tag.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        
        .trope-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .trope-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #0f3460;
            transition: all 0.2s;
        }
        
        .trope-item:hover {
            border-color: #00d4ff;
            transform: translateX(-2px);
        }
        
        .trope-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .trope-item-type {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-radius: 10px;
        }
        
        .trope-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .trope-item-content {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .trope-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #0f3460;
        }
        
        .btn-copy {
            padding: 4px 12px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-copy:hover {
            background: #00d4ff;
        }

        /* Token输入框样式 */
        .token-input-group {
            display: flex;
            gap: 10px;
        }
        
        .token-input-group input {
            flex: 1;
        }
        
        .token-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .token-status.valid {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        
        .token-status.invalid {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        
        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .sync-status.synced {
            border-left: 3px solid #28a745;
        }
        
        .sync-status.unsynced {
            border-left: 3px solid #ffc107;
        }
        
        .sync-status.error {
            border-left: 3px solid #dc3545;
        }

        /* GitHub设置模态框 */
        .github-setup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .github-setup-modal.active {
            display: flex;
        }
        
        .github-setup-content {
            background: #16213e;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }
        
        .github-setup-content h2 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        
        .github-setup-content p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .github-setup-content .form-group {
            text-align: left;
        }
        
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .help-text a {
            color: #00d4ff;
        }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🎮 创世者</h1>
                <p>镜像囚笼 · 小说编辑器</p>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" data-page="home">
                    <i>🏠</i>首页
                </a>
                <a class="nav-item" data-page="characters">
                    <i>👤</i>角色管理
                </a>
                <a class="nav-item" data-page="world">
                    <i>🌍</i>世界观
                </a>
                <a class="nav-item" data-page="plot">
                    <i>📖</i>情节大纲
                </a>
                <a class="nav-item" data-page="data">
                    <i>💾</i>数据管理
                </a>
            </nav>
        </aside>
        
        <!-- 主内容 -->
        <main class="main-content" id="mainContent">
            <!-- 动态加载内容 -->
        </main>
    </div>
    
    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm" onclick="confirmModal()">保存</button>
            </div>
        </div>
    </div>

    <!-- GitHub Token 设置模态框 -->
    <div class="github-setup-modal" id="githubSetupModal">
        <div class="github-setup-content">
            <h2>🔐 GitHub 同步设置</h2>
            <p>为了实现跨设备数据同步，请输入你的 GitHub Personal Access Token。<br>数据将安全存储在你的私有 Gist 中。</p>
            <div class="form-group">
                <label>GitHub Token</label>
                <input type="password" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <div class="help-text">
                    没有 Token？<a href="https://github.com/settings/tokens/new?description=NovelEditor&scopes=gist" target="_blank">点击这里创建</a>（只需勾选 gist 权限）
                </div>
            </div>
            <div id="githubSetupError" style="color: #dc3545; margin-bottom: 15px; font-size: 14px; display: none;"></div>
            <button class="btn btn-primary" onclick="saveGitHubToken()" style="width: 100%;">保存并验证</button>
            <button class="btn btn-secondary" onclick="skipGitHubSetup()" style="width: 100%; margin-top: 10px; background: transparent;">稍后再说</button>
        </div>
    </div>

    <script>
        // ==================== GitHub 同步模块 ====================
        class GitHubSync {
            constructor() {
                this.token = localStorage.getItem('github_token');
                this.gistId = localStorage.getItem('github_gist_id');
                this.lastSyncTime = localStorage.getItem('last_sync_time');
                this.tropeDataUrl = 'https://raw.githubusercontent.com/sztbssz/novel-editor/master/data.json';
            }

            // 检查是否已配置
            isConfigured() {
                return !!this.token;
            }

            // 保存 Token
            saveToken(token) {
                this.token = token;
                localStorage.setItem('github_token', token);
            }

            // 验证 Token
            async verifyToken() {
                if (!this.token) return false;
                try {
                    const response = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    return response.ok;
                } catch (e) {
                    return false;
                }
            }

            // 获取或创建 Gist
            async getOrCreateGist() {
                if (this.gistId) {
                    // 检查 Gist 是否存在
                    try {
                        const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                            headers: {
                                'Authorization': `token ${this.token}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });
                        if (response.ok) {
                            return this.gistId;
                        }
                    } catch (e) {
                        console.error('Gist check failed:', e);
                    }
                }

                // 创建新 Gist
                try {
                    const response = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            description: '创世者编辑器 - 小说写作数据备份',
                            public: false,
                            files: {
                                'novel_editor_data.json': {
                                    content: JSON.stringify({
                                        version: 1,
                                        created_at: new Date().toISOString(),
                                        characters: [],
                                        world_settings: [],
                                        plots: []
                                    }, null, 2)
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.gistId = data.id;
                        localStorage.setItem('github_gist_id', data.id);
                        return data.id;
                    }
                } catch (e) {
                    console.error('Create gist failed:', e);
                    throw e;
                }
            }

            // 从 Gist 加载数据
            async loadFromGist() {
                if (!this.gistId || !this.token) return null;

                try {
                    const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const file = data.files['novel_editor_data.json'];
                        if (file) {
                            const content = JSON.parse(file.content);
                            this.lastSyncTime = new Date().toISOString();
                            localStorage.setItem('last_sync_time', this.lastSyncTime);
                            return content;
                        }
                    }
                } catch (e) {
                    console.error('Load from gist failed:', e);
                }
                return null;
            }

            // 保存数据到 Gist
            async saveToGist(data) {
                const gistId = await this.getOrCreateGist();

                try {
                    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${this.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: {
                                'novel_editor_data.json': {
                                    content: JSON.stringify({
                                        version: 1,
                                        updated_at: new Date().toISOString(),
                                        ...data
                                    }, null, 2)
                                }
                            }
                        })
                    });

                    if (response.ok) {
                        this.lastSyncTime = new Date().toISOString();
                        localStorage.setItem('last_sync_time', this.lastSyncTime);
                        return true;
                    }
                } catch (e) {
                    console.error('Save to gist failed:', e);
                }
                return false;
            }

            // 从远程加载桥段数据
            async loadTropeData() {
                try {
                    const response = await fetch(this.tropeDataUrl);
                    if (response.ok) {
                        const data = await response.json();
                        // 缓存到 localStorage
                        localStorage.setItem('trope_data_cache', JSON.stringify(data));
                        localStorage.setItem('trope_data_cache_time', new Date().toISOString());
                        return data;
                    }
                } catch (e) {
                    console.error('Load trope data failed:', e);
                }

                // 如果加载失败，尝试使用缓存
                const cached = localStorage.getItem('trope_data_cache');
                if (cached) {
                    return JSON.parse(cached);
                }

                return null;
            }

            // 清除配置
            clearConfig() {
                this.token = null;
                this.gistId = null;
                this.lastSyncTime = null;
                localStorage.removeItem('github_token');
                localStorage.removeItem('github_gist_id');
                localStorage.removeItem('last_sync_time');
            }
        }

        // ==================== 数据库模块 ====================
        class Database {
            constructor() {
                this.db = null;
                this.dbName = 'CreatorDB';
                this.dbVersion = 1;
                this.githubSync = new GitHubSync();
                this.syncEnabled = true;
            }
            
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // 角色表
                        if (!db.objectStoreNames.contains('characters')) {
                            const charStore = db.createObjectStore('characters', { keyPath: 'id', autoIncrement: true });
                            charStore.createIndex('name', 'name', { unique: false });
                            charStore.createIndex('role_type', 'role_type', { unique: false });
                        }
                        
                        // 世界观表
                        if (!db.objectStoreNames.contains('world_settings')) {
                            const worldStore = db.createObjectStore('world_settings', { keyPath: 'id', autoIncrement: true });
                            worldStore.createIndex('category', 'category', { unique: false });
                        }
                        
                        // 情节表
                        if (!db.objectStoreNames.contains('plots')) {
                            const plotStore = db.createObjectStore('plots', { keyPath: 'id', autoIncrement: true });
                            plotStore.createIndex('volume', 'volume', { unique: false });
                            plotStore.createIndex('chapter', 'chapter', { unique: false });
                        }
                    };
                });
            }
            
            // 通用CRUD操作
            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.created_at = new Date().toISOString();
                    data.updated_at = new Date().toISOString();
                    const request = store.add(data);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve(request.result);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async get(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            async getAll(storeName, indexName = null, value = null) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    let request;
                    
                    if (indexName && value !== null) {
                        const index = store.index(indexName);
                        request = index.getAll(value);
                    } else {
                        request = store.getAll();
                    }
                    
                    request.onsuccess = () => {
                        // 按更新时间倒序
                        const results = request.result.sort((a, b) => 
                            new Date(b.updated_at) - new Date(a.updated_at)
                        );
                        resolve(results);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async update(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    data.updated_at = new Date().toISOString();
                    const request = store.put(data);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve(request.result);
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = async () => {
                        if (this.syncEnabled) {
                            await this.syncToGitHub();
                        }
                        resolve();
                    };
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 导出所有数据
            async exportAll() {
                return {
                    characters: await this.getAll('characters'),
                    world_settings: await this.getAll('world_settings'),
                    plots: await this.getAll('plots'),
                    export_time: new Date().toISOString()
                };
            }
            
            // 导入数据
            async importAll(data) {
                await this.clear('characters');
                await this.clear('world_settings');
                await this.clear('plots');
                
                for (const char of data.characters || []) {
                    delete char.id;
                    await this.add('characters', char);
                }
                
                for (const setting of data.world_settings || []) {
                    delete setting.id;
                    await this.add('world_settings', setting);
                }
                
                for (const plot of data.plots || []) {
                    delete plot.id;
                    await this.add('plots', plot);
                }

                // 导入后同步到 GitHub
                if (this.syncEnabled) {
                    await this.syncToGitHub();
                }
            }

            // 同步到 GitHub
            async syncToGitHub() {
                if (!this.githubSync.isConfigured()) return false;
                
                try {
                    const data = await this.exportAll();
                    const success = await this.githubSync.saveToGist(data);
                    if (success) {
                        updateSyncStatus('synced', '已同步到 GitHub');
                    }
                    return success;
                } catch (e) {
                    console.error('Sync to GitHub failed:', e);
                    updateSyncStatus('error', '同步失败');
                    return false;
                }
            }

            // 从 GitHub 加载
            async loadFromGitHub() {
                if (!this.githubSync.isConfigured()) return false;
                
                try {
                    const data = await this.githubSync.loadFromGist();
                    if (data) {
                        this.syncEnabled = false; // 临时禁用同步避免循环
                        await this.importAll(data);
                        this.syncEnabled = true;
                        updateSyncStatus('synced', '已从 GitHub 加载');
                        return true;
                    }
                } catch (e) {
                    console.error('Load from GitHub failed:', e);
                    updateSyncStatus('error', '加载失败');
                }
                return false;
            }
        }

        async function saveGitHubToken() {
            const token = document.getElementById('githubTokenInput').value.trim();
            const errorDiv = document.getElementById('githubSetupError');
            
            if (!token) {
                errorDiv.textContent = '请输入 GitHub Token';
                errorDiv.style.display = 'block';
                return;
            }

            if (!token.startsWith('ghp_')) {
                errorDiv.textContent = 'Token 格式不正确，应以 ghp_ 开头';
                errorDiv.style.display = 'block';
                return;
            }

            // 显示加载状态
            const btn = document.querySelector('#githubSetupModal .btn-primary');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading-spinner"></span> 验证中...';
            btn.disabled = true;

            try {
                githubSync.saveToken(token);
                const valid = await githubSync.verifyToken();
                
                if (valid) {
                    // 获取或创建 Gist
                    await githubSync.getOrCreateGist();
                    hideGitHubSetupModal();
                    showNotification('GitHub Token 已保存');
                    
                    // 尝试从 GitHub 加载数据
                    const loaded = await syncFromGitHub();
                    if (loaded) {
                        loadPage('home');
                    }
                } else {
                    errorDiv.textContent = 'Token 验证失败，请检查是否正确';
                    errorDiv.style.display = 'block';
                    githubSync.clearConfig();
                }
            } catch (e) {
                errorDiv.textContent = '验证失败：' + e.message;
                errorDiv.style.display = 'block';
                githubSync.clearConfig();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

                const icons = {
                    synced: '✅',
                    unsynced: '⏳',
                    error: '❌'
                };
                statusEl.innerHTML = `${icons[status] || '⏳'} ${message}`;
            }
        }

                        </div>

        function toggleTropePanel() {
            showTropePanel = !showTropePanel;
            const panel = document.getElementById('tropePanel');
            if (panel) {
                panel.classList.toggle('active', showTropePanel);
            } else {
                renderPlot(document.getElementById('mainContent'));
            }
        }
        
        function filterTropes(category) {
            currentTropeFilter = category;
            renderPlot(document.getElementById('mainContent'));
        }
        
        function searchTropes() {
            tropeSearchQuery = document.getElementById('tropeSearch')?.value || '';
            renderPlot(document.getElementById('mainContent'));
        }
        
        function renderTropeItems() {
            if (!tropesData || !tropesData.tropes) {
                return '<div style="text-align:center;color:#888;padding:20px;">加载中...</div>';
            }

            let filtered = tropesData.tropes;
            
            if (currentTropeFilter !== 'all') {
                filtered = filtered.filter(t => t.category === currentTropeFilter);
            }
            
            if (tropeSearchQuery) {
                const q = tropeSearchQuery.toLowerCase();
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(q) ||
                    t.content.toLowerCase().includes(q) ||
                    t.subType.toLowerCase().includes(q)
                );
            }
            
            if (filtered.length === 0) {
                return '<div style="text-align:center;color:#888;padding:20px;">暂无匹配桥段</div>';
            }
            
            return filtered.map(trope => {
                const category = tropesData.categories.find(c => c.id === trope.category);
                return `
                    <div class="trope-item">
                        <div class="trope-item-header">
                            <span class="trope-item-type">${category?.name || trope.category}</span>
                            <span style="font-size:11px;color:#888;">${trope.subType}</span>
                        </div>
                        <div class="trope-item-title">${trope.title}</div>
                        <div class="trope-item-content">${trope.content}</div>
                        <div class="trope-item-footer">
                            <span style="font-size:11px;color:#666;">《${trope.book}》${trope.author}</span>
                            <button class="btn-copy" onclick="copyTropeContent('${trope.title}', '${trope.content.replace(/'/g, "\\'")}')">复制</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function copyTropeContent(title, content) {

                showNotification('桥段已复制到剪贴板');

                        <span class="card-type" style="background: rgba(40, 167, 69, 0.2); color: #28a745;">已启用</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px;">
                            <div>
                                <div style="color: #888; font-size: 12px;">上次同步</div>
                                <div style="color: #fff; font-size: 14px;">${githubSync.lastSyncTime ? new Date(githubSync.lastSyncTime).toLocaleString('zh-CN') : '从未'}</div>
                            </div>
                            <div>
                                <div style="color: #888; font-size: 12px;">Gist ID</div>
                                <div style="color: #888; font-size: 12px; word-break: break-all;">${githubSync.gistId || '未创建'}</div>
                            </div>
                        </div>
                        <div class="data-ops">
                            <button class="btn btn-success" onclick="syncToGitHub()">📤 立即同步到云端</button>
                            <button class="btn btn-secondary" onclick="syncFromGitHub()">📥 从云端恢复</button>
                            <button class="btn btn-secondary" onclick="openGitHubSettings()">⚙️ 同步设置</button>
                        </div>
                    </div>
                </div>
            ` : `
                <div class="card" style="margin-bottom: 30px; border-left: 3px solid #ffc107;">
                    <div class="card-header">
                        <span class="card-title">☁️ GitHub 云同步</span>
                        <span class="card-type" style="background: rgba(255, 193, 7, 0.2); color: #ffc107;">未启用</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <p style="color: #888; margin-bottom: 15px; font-size: 14px;">
                            启用云同步后，你的写作数据将自动备份到 GitHub Gist，可在多台设备间同步。
                        </p>
                        <button class="btn btn-primary" onclick="openGitHubSettings()">🔐 启用云同步</button>
                    </div>
                </div>
            `;
            
            container.innerHTML = `
                <div class="header">
                    <h2>💾 数据管理</h2>
                </div>
                
                ${githubSection}
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">📊 数据概览</span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 0;">
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${chars.length}</div>
                            <div style="color: #888; margin-top: 5px;">角色数量</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${world.length}</div>
                            <div style="color: #888; margin-top: 5px;">世界观设定</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 36px; color: #00d4ff; font-weight: bold;">${plots.length}</div>
                            <div style="color: #888; margin-top: 5px;">章节数量</div>
                        </div>
                    </div>
                </div>
                
                <div class="card" style="margin-bottom: 30px;">
                    <div class="card-header">
                        <span class="card-title">💾 本地数据操作</span>
                    </div>
                    <div style="padding: 15px 0;">
                        <div class="data-ops">
                            <button class="btn btn-primary" onclick="exportData()">📤 导出数据</button>
                            <button class="btn btn-secondary" onclick="importData()">📥 导入数据</button>
                            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空数据</button>
                        </div>
                    </div>
                </div>
                
                <input type="file" id="importFile" style="display: none" accept=".json" onchange="handleImport(event)">
            `;
        }
        
        async function exportData() {
            const data = await db.exportAll();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novel_data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function importData() {
            document.getElementById('importFile').click();
        }
        
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!confirm('导入数据将覆盖现有数据，是否继续？')) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.importAll(data);
                    alert('数据导入成功！');
                    loadPage('data');
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            if (!confirm('真的确定吗？所有角色、世界观、情节都将被删除！')) return;
            
            await db.clear('characters');
            await db.clear('world_settings');
            await db.clear('plots');
            alert('数据已清空');
            loadPage('data');
        }
        
        // ==================== 模态框控制 ====================
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            modalCallback = null;
        }
        
        function confirmModal() {
            if (modalCallback) {
                modalCallback();
            }
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
